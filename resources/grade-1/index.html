<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grade 1 Resources</title>
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f6f7fb;color:#111827}
      .wrap{max-width:980px;margin:0 auto;padding:22px 14px}
      .card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:16px 16px;box-shadow:0 10px 30px rgba(17,24,39,0.06)}
      h1{margin:0 0 6px;font-size:22px}
      p{margin:0 0 14px;color:#4b5563;font-size:14px;line-height:1.5}
      .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
      a.box{display:block;text-decoration:none;border:1px solid #e5e7eb;border-radius:14px;padding:14px;background:#f9fafb;color:#111827}
      a.box:hover{border-color:#c7d2fe;background:#eef2ff}
      .tag{display:inline-block;margin-top:8px;background:#eef2ff;color:#4338ca;border-radius:999px;padding:4px 10px;font-weight:700;font-size:12px}
      .crumb{font-size:12px;margin-bottom:10px}
      .crumb a{color:#4f46e5;text-decoration:none;font-weight:700}
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="crumb"><a href="/?portal=teacher">← Back to Teacher Portal</a></div>
      <div class="card">
        <h1>Grade 1 Worksheets (Preview Folder)</h1>
        <p>
          Open a subject folder below to preview the worksheets first. Each worksheet can be opened (previewed) and then downloaded.
        </p>
        <div class="grid">
          <a class="box" href="./mathematics/">
            <div style="font-weight:800;font-size:16px">Mathematics</div>
            <div class="tag">Preview & Download</div>
          </a>
          <a class="box" href="./english/">
            <div style="font-weight:800;font-size:16px">English</div>
            <div class="tag">Preview & Download</div>
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
