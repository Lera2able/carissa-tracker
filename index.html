function ReadingAssessmentTab({reading,setReading}){
  const [selClass,setSelClass]=useState('');
  const [search,setSearch]=useState('');
  const [editing,setEditing]=useState(null);
  const [msg,setMsg]=useState('');
  const showMsg=m=>{setMsg(m);setTimeout(()=>setMsg(''),5000);};

  const classLearners=selClass?(CLASS_DATA[selClass]||[]):[];
  const filtered=search.trim()
    ? classLearners.filter(l=>(`${l.surname} ${l.firstname}`).toLowerCase().includes(search.toLowerCase()))
    : classLearners;

  const latestFor=(cls,surname,firstname)=>{
    const recs=reading.filter(r=>r.class_name===cls&&r.surname===surname&&r.firstname===firstname);
    if(!recs.length) return null;
    return recs.slice().sort((a,b)=>new Date(b.date_assessed||b.created_at)-new Date(a.date_assessed||a.created_at))[0];
  };

  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}
      <div style={{...card,marginBottom:'14px'}}>
        <h3 style={{...ctitle,marginBottom:'10px'}}>📖 One-Minute Reading Assessment</h3>
        <p style={{color:'#666',fontSize:'13px',marginBottom:'14px'}}>
          Pick a class, then click <strong>+ Start</strong> next to a learner. A 60-second timer runs while the learner reads aloud; when it stops, record the number of words read correctly.
        </p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'12px'}}>
          <div>
            <label style={lbl}>Class</label>
            <select style={inp} value={selClass} onChange={e=>{setSelClass(e.target.value);setSearch('');}}>
              <option value="">-- Select Class --</option>
              {ASSESS_CLASS_NAMES.map(n=>(<option key={n} value={n}>{n} ({CLASS_DATA[n].length})</option>))}
            </select>
          </div>
          <div>
            <label style={lbl}>Search learner</label>
            <input style={inp} placeholder="Type a name to filter..." value={search} onChange={e=>setSearch(e.target.value)} disabled={!selClass}/>
          </div>
        </div>
      </div>

      {selClass && (
        <div style={card}>
          <h3 style={ctitle}>{selClass} — Learners ({filtered.length})</h3>
          {filtered.length===0 ? (
            <p style={{color:'#999',textAlign:'center',padding:'20px'}}>No learners match your search.</p>
          ) : (
            <div style={{display:'grid',gap:'8px'}}>
              {filtered.map((l,i)=>{
                const existing=latestFor(selClass,l.surname,l.firstname);
                return (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',background:existing?'#e8f5e9':'#f8f9fa',borderRadius:'10px',borderLeft:`5px solid ${existing?'#28a745':'#cbd5e1'}`,gap:'10px',flexWrap:'wrap'}}>
                    <div style={{flex:1,minWidth:'180px'}}>
                      <div style={{fontWeight:600,color:'#333',fontSize:'14px'}}>{l.surname}, {l.firstname}</div>
                      {existing && (
                        <div style={{fontSize:'12px',color:'#155724',marginTop:'2px'}}>
                          ✓ {existing.words_correct} words/min · {existing.term||''} · {new Date(existing.date_assessed||existing.created_at).toLocaleDateString('en-ZA')}{existing.reading_age?` · approx age ${existing.reading_age}`:''}
                        </div>
                      )}
                    </div>
                    <div style={{display:'flex',gap:'8px',flexShrink:0,flexWrap:'wrap'}}>
                      <button style={{...sbtn,background:existing?'#667eea':'#f97316',fontSize:'13px'}} onClick={()=>setEditing({...l,existing:existing||null})}>
                        {existing?'✏️ View / Re-test':'+ Start'}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {editing && (
        <ReadingAssessmentModal
          learner={editing}
          className={selClass}
          phase={phaseForClass(selClass)}
          onClose={()=>setEditing(null)}
          onSaved={(record,isUpdate)=>{
            setReading(p=>isUpdate?p.map(r=>r.id===record.id?record:r):[record,...p]);
            showMsg(isUpdate?'✓ Reading result updated.':'✓ Reading result saved.');
            setEditing(null);
          }}
          onDelete={(id)=>{
            setReading(p=>p.filter(r=>r.id!==id));
            showMsg('✓ Reading result deleted.');
            setEditing(null);
          }}
        />
      )}
    </div>
  );
}

function ReadingAssessmentModal({learner,className,phase,onClose,onSaved,onDelete}){
  const existing=learner.existing;
  const isUpdate=!!existing;
  const DURATION=60;

  const [secs,setSecs]=useState(DURATION);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const intervalRef=useRef(null);

  const [words,setWords]=useState(existing&&existing.words_correct!=null?String(existing.words_correct):'');
  const [errs,setErrs]=useState(existing&&existing.errors!=null?String(existing.errors):'');
  const [term,setTerm]=useState((existing&&existing.term)||'Term 2');
  const [notes,setNotes]=useState((existing&&existing.notes)||'');
  const [busy,setBusy]=useState(false);

  useEffect(()=>()=>{ if(intervalRef.current) clearInterval(intervalRef.current); },[]);

  const beep=()=>{ try{ const A=window.AudioContext||window.webkitAudioContext; const a=new A(); const o=a.createOscillator(); const g=a.createGain(); o.connect(g); g.connect(a.destination); o.frequency.value=880; g.gain.value=0.15; o.start(); setTimeout(()=>{o.stop();a.close();},450);}catch(e){} };
  const tick=()=>{
    setSecs(s=>{
      if(s<=1){
        if(intervalRef.current){clearInterval(intervalRef.current);intervalRef.current=null;}
        setRunning(false); setDone(true); beep();
        return 0;
      }
      return s-1;
    });
  };
  const start=()=>{ if(running||done) return; setRunning(true); intervalRef.current=setInterval(tick,1000); };
  const pause=()=>{ setRunning(false); if(intervalRef.current){clearInterval(intervalRef.current);intervalRef.current=null;} };
  const reset=()=>{ pause(); setSecs(DURATION); setDone(false); };

  const mm=String(Math.floor(secs/60)).padStart(2,'0');
  const ss=String(secs%60).padStart(2,'0');
  const wordsNum=parseInt(words,10);
  const age=readingAgeFromWords(isNaN(wordsNum)?null:wordsNum);
  const timerColor=done?'#28a745':(secs<=10&&running?'#dc3545':'#667eea');

  const handleSave=async()=>{
    if(words===''||isNaN(wordsNum)||wordsNum<0){ alert('Please enter the number of words read correctly.'); return; }
    setBusy(true);
    try{
      const payload={
        surname:learner.surname, firstname:learner.firstname, class_name:className,
        phase, term, year:new Date().getFullYear(),
        words_correct:wordsNum,
        errors:(errs===''||isNaN(parseInt(errs,10)))?null:parseInt(errs,10),
        reading_age:age, duration_seconds:DURATION,
        notes:notes.trim()||null, assessed_by:(existing&&existing.assessed_by)||'Admin',
        date_assessed:(existing&&existing.date_assessed)||new Date().toISOString().split('T')[0],
        updated_at:new Date().toISOString()
      };
      if(isUpdate){
        const rows=await db.patch('carissa_reading_assessments',`id=eq.${existing.id}`,payload);
        onSaved(rows[0],true);
      }else{
        const rows=await db.post('carissa_reading_assessments',payload);
        onSaved(rows[0],false);
      }
    }catch(e){ alert('Error saving: '+e.message); }
    setBusy(false);
  };

  const handleDelete=async()=>{
    if(!confirm('Delete this reading result? This cannot be undone.')) return;
    setBusy(true);
    try{ await db.del('carissa_reading_assessments',`id=eq.${existing.id}`); onDelete(existing.id); }
    catch(e){ alert('Error: '+e.message); }
    setBusy(false);
  };

  return (
    <div style={ovly} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={mdl}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
          <h3 style={{margin:0,color:'#667eea',fontSize:'18px'}}>📖 One-Minute Reading</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:'22px',cursor:'pointer',color:'#999'}}>×</button>
        </div>
        <p style={{margin:'0 0 16px',color:'#333',fontWeight:600}}>{learner.surname}, {learner.firstname} <span style={{color:'#999',fontWeight:400,fontSize:'13px'}}>· {className}</span></p>

        <div style={{textAlign:'center',background:'#f8f9fa',borderRadius:'14px',padding:'20px',marginBottom:'18px'}}>
          <div style={{fontSize:'56px',fontWeight:700,letterSpacing:'2px',color:timerColor,fontVariantNumeric:'tabular-nums'}}>{mm}:{ss}</div>
          <div style={{fontSize:'13px',color:'#888',marginBottom:'14px'}}>{done?"Time's up — record the score below":(running?'Reading…':'Ready')}</div>
          <div style={{display:'flex',gap:'8px',justifyContent:'center',flexWrap:'wrap'}}>
            {!running && !done && secs===DURATION && <button style={{...sbtn,background:'#28a745'}} onClick={start}>▶ Start</button>}
            {!running && !done && secs<DURATION && <button style={{...sbtn,background:'#28a745'}} onClick={start}>▶ Resume</button>}
            {running && <button style={{...sbtn,background:'#f59e0b'}} onClick={pause}>⏸ Pause</button>}
            <button style={{...sbtn,background:'#64748b'}} onClick={reset}>↻ Reset</button>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'12px'}}>
          <div>
            <label style={lbl}>Words read correctly</label>
            <input style={inp} type="number" min="0" value={words} onChange={e=>setWords(e.target.value)} placeholder="e.g. 48"/>
          </div>
          <div>
            <label style={lbl}>Errors (optional)</label>
            <input style={inp} type="number" min="0" value={errs} onChange={e=>setErrs(e.target.value)} placeholder="e.g. 3"/>
          </div>
        </div>
        {age && <div style={{background:'#eef2ff',color:'#3730a3',borderRadius:'8px',padding:'8px 12px',fontSize:'13px',marginBottom:'12px'}}>Approx. reading age: <strong>{age}</strong> <span style={{color:'#6b7280'}}>(guide only)</span></div>}

        <div style={{marginBottom:'12px'}}>
          <label style={lbl}>Term</label>
          <select style={inp} value={term} onChange={e=>setTerm(e.target.value)}>
            {['Term 1','Term 2','Term 3','Term 4'].map(t=>(<option key={t} value={t}>{t}</option>))}
          </select>
        </div>
        <div style={{marginBottom:'16px'}}>
          <label style={lbl}>Notes (optional)</label>
          <textarea style={{...inp,minHeight:'60px',resize:'vertical'}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Fluency, expression, difficulties…"/>
        </div>

        <div style={{display:'flex',gap:'8px',justifyContent:'space-between',flexWrap:'wrap'}}>
          <div>{isUpdate && <button style={{...sbtn,background:'#dc3545'}} disabled={busy} onClick={handleDelete}>🗑 Delete</button>}</div>
          <div style={{display:'flex',gap:'8px'}}>
            <button style={{...sbtn,background:'#94a3b8'}} disabled={busy} onClick={onClose}>Cancel</button>
            <button style={sbtn} disabled={busy} onClick={handleSave}>{busy?'Saving…':(isUpdate?'Update':'Save')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function TeacherView({onEditName}){
  const [step,setStep]=useState('class'); // class -> teacher -> learners
  const [selClass,setSelClass]=useState('');
  const [teacher,setTeacher]=useState({name:'',whatsapp:''});
  const [modalFor,setModalFor]=useState(null); // learner being added to intervention
  const [interventions,setInts]=useState([]); // for this class
  const [msg,setMsg]=useState('');
  const showMsg = m => {setMsg(m);setTimeout(()=>setMsg(''),5000);};

  // Load any existing interventions for the chosen class (after we know the class)
  useEffect(()=>{
    if(!selClass) return;
    (async()=>{
      try{
        const d = await db.get('carissa_interventions',`class_name=eq.${encodeURIComponent(selClass)}&order=surname.asc`);
        setInts(d);
      }catch(e){console.error(e);}
    })();
  },[selClass]);

  // Also try to autofill teacher info from carissa_teachers
  useEffect(()=>{
    if(!selClass) return;
    (async()=>{
      try{
        const d = await db.get('carissa_teachers',`class_name=eq.${encodeURIComponent(selClass)}`);
        if(d.length>0) setTeacher({name:d[0].teacher_name||'',whatsapp:d[0].whatsapp||''});
      }catch(e){console.error(e);}
    })();
  },[selClass]);

  const proceedTeacher = async () => {
    if(!teacher.name.trim()||!teacher.whatsapp.trim()){alert('Please enter your name and WhatsApp.');return;}
    try{
      await db.post('carissa_teachers',{class_name:selClass,teacher_name:teacher.name.trim(),whatsapp:teacher.whatsapp.trim()},'resolution=merge-duplicates,return=minimal');
    }catch(e){console.error(e);}
    setStep('learners');
  };

  const saveIntervention = async (barriers,comments) => {
    if(!modalFor) return;
    try{
      const row = {
        surname: modalFor.surname,
        firstname: modalFor.firstname,
        class_name: selClass,
        barriers,
        comments: comments.trim() || null,
        teacher_name: teacher.name.trim(),
        teacher_whatsapp: teacher.whatsapp.trim()
      };
      const created = await db.post('carissa_interventions',row);
      setInts(p=>[created[0],...p]);
      setModalFor(null);
      showMsg(`✓ ${modalFor.firstname} ${modalFor.surname} added to intervention list.`);
    }catch(e){alert('Error: '+e.message);}
  };

  const learners = selClass ? (CLASS_DATA[selClass]||[]) : [];

  // STEP 1: pick class
  if(step==='class'){
    return (
      <div style={card}>
        <h3 style={ctitle}>Welcome, Teacher</h3>
        <p style={{color:'#666',fontSize:'14px',marginBottom:'14px'}}>Select your class to begin.</p>
        <select style={inp} value={selClass} onChange={e=>setSelClass(e.target.value)}>
          <option value="">-- Select Class --</option>
          {CLASS_NAMES.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
        <button style={{...btn,marginTop:'14px'}} onClick={()=>{if(!selClass){alert('Pick a class');return;}setStep('teacher');}}>Continue →</button>
      </div>
    );
  }

  // STEP 2: teacher info
  if(step==='teacher'){
    return (
      <div style={card}>
        <h3 style={ctitle}>Your Details — {selClass}</h3>
        <div style={{marginBottom:'12px'}}>
          <label style={lbl}>Your Name</label>
          <input style={inp} value={teacher.name} onChange={e=>setTeacher(p=>({...p,name:e.target.value}))} placeholder="Full name"/>
        </div>
        <div style={{marginBottom:'14px'}}>
          <label style={lbl}>WhatsApp Number</label>
          <input style={inp} value={teacher.whatsapp} onChange={e=>setTeacher(p=>({...p,whatsapp:e.target.value}))} placeholder="e.g. 082 ..."/>
        </div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <button style={btn} onClick={proceedTeacher}>Continue →</button>
          <button style={{...btn,background:'#6c757d'}} onClick={()=>setStep('class')}>← Back</button>
        </div>
      </div>
    );
  }

  // STEP 3: learner list
  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}
      <div style={card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px',marginBottom:'10px'}}>
          <div>
            <h3 style={{...ctitle,marginBottom:'2px'}}>{selClass}</h3>
            <p style={{fontSize:'13px',color:'#666'}}>{teacher.name} · {teacher.whatsapp}</p>
          </div>
          <button style={{...sbtn,background:'#6c757d'}} onClick={()=>setStep('class')}>↩ Change class</button>
        </div>
        <p style={{fontSize:'13px',color:'#666',marginBottom:'14px'}}>Click <strong>+ Add</strong> next to any learner you'd like to flag for intervention.</p>
        <div style={{display:'grid',gap:'6px'}}>
          {learners.map((l,i)=>{
            const onList = interventions.some(iv => iv.surname===l.surname && iv.firstname===l.firstname);
            return (
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:onList?'#fff3e0':'#f8f9fa',borderRadius:'8px',borderLeft:`4px solid ${onList?'#f97316':'#cbd5e1'}`}}>
                <div style={{fontSize:'14px',color:'#333'}}>
                  <strong>{l.surname}</strong>, {l.firstname}
                  {onList && <span style={{marginLeft:'10px',fontSize:'12px',color:'#f97316'}}>● On intervention list</span>}
                </div>
                {!onList && (
                  <button style={{...sbtn,background:'#667eea',fontSize:'12px',padding:'5px 12px'}} onClick={()=>setModalFor(l)}>+ Add</button>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {modalFor && <RemedialModal learner={modalFor} onSave={saveIntervention} onClose={()=>setModalFor(null)}/>}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   APP ROOT - mode tabs (teacher / coordinator / admin), login
   ════════════════════════════════════════════════════════════════ */
function App(){
  const [mode,setMode]=useState('teacher'); // 'teacher' | 'coordinator' | 'admin'
  const [showLogin,setShowLogin]=useState(false);
  const [isAdmin,setIsAdmin]=useState(false);
  const [editTarget,setEditTarget]=useState(null); // {row, onSave}
  const [overridesReady,setOverridesReady]=useState(false);

  useEffect(()=>{
    (async()=>{
      const ovr = await fetchLearnerOverrides();
      applyLearnerOverridesToClassData(ovr);
      setOverridesReady(true);
    })();
  },[]);

  const switchTo = (m) => {
    if(m==='admin' && !isAdmin){ setShowLogin(true); return; }
    setMode(m);
  };

  if(!overridesReady){
    return <div style={{display:'flex',justifyContent:'center',alignItems:'center',minHeight:'100vh',color:'#667eea',fontSize:'16px'}}>Loading…</div>;
  }

  return (
    <div style={{minHeight:'100vh'}}>
      {/* HEADER */}
      <header style={{background:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',padding:'20px',color:'white',boxShadow:'0 2px 14px rgba(0,0,0,0.15)'}}>
        <div style={{maxWidth:'1300px',margin:'0 auto',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'14px'}}>
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <img src={LOGO} alt="Carissa" style={{height:'52px',background:'white',padding:'4px',borderRadius:'10px'}}/>
            <div>
              <div style={{fontSize:'20px',fontWeight:700}}>Carissa Intervention Tracker</div>
              <div style={{fontSize:'12px',opacity:0.9}}>Remedial support & eLearning assessments</div>
            </div>
          </div>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
            <button onClick={()=>switchTo('learnworld')} style={{padding:'8px 16px',borderRadius:'20px',border:'1px solid rgba(255,255,255,0.5)',color:'white',fontSize:'13px',fontWeight:600,background:mode==='learnworld'?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.1)',cursor:'pointer'}}>🌐 LearnWorld</button>
            {isAdmin && <span style={{padding:'8px 14px',borderRadius:'20px',background:'rgba(255,255,255,0.2)',fontSize:'13px',fontWeight:600}}>🔓 Admin</span>}
          </div>
        </div>
      </header>

      {/* MODE TABS */}
      <div style={{maxWidth:'1300px',margin:'14px auto 0',padding:'0 16px'}}>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',background:'white',padding:'8px',borderRadius:'12px',boxShadow:'0 4px 14px rgba(0,0,0,0.06)'}}>
          {[
            ['teacher','👩‍🏫 Teacher'],
            ['coordinator','📋 Coordinator'],
            ['learnworld','🌐 LearnWorld'],
            ['admin','🔐 Admin Dashboard']
          ].map(([k,l])=>(
            <button key={k} onClick={()=>switchTo(k)} style={{padding:'12px 18px',borderRadius:'8px',border:'none',cursor:'pointer',fontSize:'15px',fontWeight:600,flex:'1 1 auto',minWidth:'160px',background:mode===k?'linear-gradient(135deg,#667eea,#764ba2)':'transparent',color:mode===k?'white':'#666'}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {/* MAIN CONTENT */}
      <div style={{maxWidth:'1300px',margin:'14px auto',padding:'0 16px 50px'}}>
        {mode==='teacher' && <TeacherView onEditName={(r,cb)=>setEditTarget({row:r,onSave:cb})}/>}
        {mode==='coordinator' && <CoordinatorView onEditName={(r,cb)=>setEditTarget({row:r,onSave:cb})}/>}
        {mode==='learnworld' && <LearnWorldView exportReport={exportAssessmentReport} exportClassSummary={exportClassSummary}/>}
        {mode==='admin' && isAdmin && <AdminDashboard/>}
      </div>

      {/* MODALS */}
      {showLogin && (
        <AdminLoginModal
          onSuccess={()=>{setIsAdmin(true);setShowLogin(false);setMode('admin');}}
          onClose={()=>setShowLogin(false)}
        />
      )}
      {editTarget && (
        <EditNameModal
          surname={editTarget.row.surname}
          firstname={editTarget.row.firstname}
          onClose={()=>setEditTarget(null)}
          onSave={async(s,f)=>{
            try{
              await db.patch('carissa_interventions',`id=eq.${editTarget.row.id}`,{surname:s,firstname:f});
              editTarget.onSave(s,f);
              setEditTarget(null);
            }catch(e){alert('Error: '+e.message);}
          }}
        />
      )}
    </div>
  );
}

/* Mount */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

      ) : (

            <div style={card}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',flexWrap:'wrap',marginBottom:'12px'}}>

                {classAssessments.length>0 && (

                      <div style={{display:'flex',flexDirection:'column',gap:'6px',flexShrink:0}}>

                          <button key={s.v} style={{...sbtn,background:s.c,fontSize:'12px',padding:'8px 12px',whiteSpace:'nowrap'}}

                            Mark {s.l}
                          </button>
                        ))}
                        <button style={{...sbtn,background:'#6c757d',fontSize:'12px',padding:'8px 12px'}}
                          onClick={()=>saveProgress(a.id,a.status,noteVal)}>
                          💾 Save Notes
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ── Resources tab ─────────────────────── */}
          {tab==='resources' && <ResourcesLibrary resources={resources}/>}
        </>
      )}
    </div>
  );
}

/* ── Resources Library (read-only, shared by LearnWorld) ──── */
function ResourcesLibrary({resources}){
  const [search,setSearch]=useState('');
  const [filterType,setFT]=useState('all');
  const typeIcon = t => RESOURCE_TYPES.find(x=>x.v===t)?.icon || '📎';
  const filtered = resources.filter(r=>{
    const ms = !search.trim() || (`${r.title} ${r.subject||''} ${r.grade_range||''} ${r.description||''}`).toLowerCase().includes(search.toLowerCase());
    const mt = filterType==='all' || r.type===filterType;
    return ms && mt;
  });
  return (
    <div style={card}>
      <h3 style={ctitle}>📁 Resource Library</h3>
      <p style={{color:'#666',fontSize:'13px',marginBottom:'14px'}}>Resources shared by the admin. Click <strong>Open</strong> to view or download.</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'10px',marginBottom:'14px'}}>
        <div>
          <label style={lbl}>Search</label>
          <input style={inp} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Title, subject, grade..."/>
        </div>
        <div>
          <label style={lbl}>Type</label>
          <select style={inp} value={filterType} onChange={e=>setFT(e.target.value)}>
            <option value="all">All types</option>
            {RESOURCE_TYPES.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
          </select>
        </div>
      </div>
      {filtered.length===0 ? (
        <p style={{color:'#999',textAlign:'center',padding:'30px'}}>
          {resources.length===0 ? 'No resources have been uploaded yet.' : 'No resources match your filter.'}
        </p>
      ) : (
        <div style={{display:'grid',gap:'10px'}}>
          {filtered.map(r=>(
            <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'14px',background:'#f8f9fa',borderRadius:'10px',borderLeft:'5px solid #667eea',gap:'12px',flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:'200px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
                  <span style={{fontSize:'20px'}}>{typeIcon(r.type)}</span>
                  <span style={{fontWeight:700,color:'#333',fontSize:'15px'}}>{r.title}</span>
                </div>
                <div style={{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'4px'}}>
                  {r.subject && <span style={{background:'#667eea22',color:'#667eea',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{r.subject}</span>}
                  {r.grade_range && <span style={{background:'#28a74522',color:'#28a745',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{r.grade_range}</span>}
                </div>
                {r.description && <p style={{fontSize:'13px',color:'#666',marginTop:'4px'}}>{r.description}</p>}
              </div>
              <a href={r.url} target="_blank" rel="noreferrer" style={{...sbtn,background:'#28a745',textDecoration:'none',display:'inline-block',flexShrink:0}}>🔗 Open / Download</a>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   ADMIN DASHBOARD: AUDIT & RECOVERY TAB (NEW)
   View change history and restore deleted records
   ════════════════════════════════════════════════════════════════ */
const AUDIT_TABLES = [
  {v:'all', l:'All tables'},
  {v:'carissa_interventions', l:'Interventions', friendly:'Interventions'},
  {v:'carissa_elearning_assessments', l:'eLearning Assessments', friendly:'Assessments'},
  {v:'carissa_resources', l:'Resources', friendly:'Resources'},
  {v:'carissa_resource_assignments', l:'Resource Assignments', friendly:'Assignments'},
  {v:'carissa_teachers', l:'Teachers', friendly:'Teachers'},
];
const friendlyTable = t => AUDIT_TABLES.find(x=>x.v===t)?.friendly || t;

function AuditAdminTab(){
  const [logs,setLogs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterTable,setFT]=useState('all');
  const [filterOp,setFO]=useState('all');
  const [search,setSearch]=useState('');
  const [msg,setMsg]=useState('');
  const showMsg = m => {setMsg(m);setTimeout(()=>setMsg(''),5000);};

  const load = async () => {
    setLoading(true);
    try{
      // Last 500 entries should be plenty
      const d = await db.get('carissa_audit_log','order=changed_at.desc&limit=500');
      setLogs(d);
    }catch(e){console.error(e);}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  /* Restore: re-insert a deleted record from its old_data snapshot */
  const restore = async (entry) => {
    if(entry.operation !== 'DELETE'){alert('Only deleted records can be restored.');return;}
    const data = entry.old_data;
    if(!data){alert('No data to restore.');return;}
    if(!confirm(`Restore this ${friendlyTable(entry.table_name)} record?`)) return;

    /* Strip timestamp fields that should regenerate; keep id so restored row points back to the same one */
    const payload = {...data};
    delete payload.created_at;
    delete payload.updated_at;

    try{
      await db.post(entry.table_name, payload, 'return=minimal');
      showMsg(`✓ Restored to ${friendlyTable(entry.table_name)}.`);
      await load(); // refresh to show the new INSERT audit entry
    }catch(e){
      /* If the id already exists (row was restored before, or never deleted physically), try without id */
      if(String(e.message).includes('duplicate')){
        const noId = {...payload}; delete noId.id;
        try{
          await db.post(entry.table_name, noId, 'return=minimal');
          showMsg(`✓ Restored (new id).`);
          await load();
        }catch(e2){alert('Restore failed: '+e2.message);}
      } else {
        alert('Restore failed: '+e.message);
      }
    }
  };

  /* Filtering */
  const filtered = logs.filter(l=>{
    const mt = filterTable==='all' || l.table_name===filterTable;
    const mo = filterOp==='all' || l.operation===filterOp;
    if(!search.trim()) return mt && mo;
    const blob = JSON.stringify(l.old_data || l.new_data || {}).toLowerCase();
    return mt && mo && blob.includes(search.toLowerCase());
  });

  /* Friendly description of an entry */
  const describe = (l) => {
    const d = l.old_data || l.new_data || {};
    if(d.surname && d.firstname) return `${d.surname}, ${d.firstname}${d.class_name?` (${d.class_name})`:''}`;
    if(d.title) return d.title;
    if(d.teacher_name) return `${d.teacher_name} (${d.class_name||''})`;
    return l.row_id || '—';
  };

  const opColor = op => op==='INSERT' ? '#28a745' : op==='UPDATE' ? '#f97316' : '#dc3545';
  const opIcon  = op => op==='INSERT' ? '➕' : op==='UPDATE' ? '✏️' : '🗑';

  /* Count of restorable (deleted) records */
  const deletedCount = logs.filter(l=>l.operation==='DELETE').length;
  const insertCount  = logs.filter(l=>l.operation==='INSERT').length;
  const updateCount  = logs.filter(l=>l.operation==='UPDATE').length;

  if(loading) return <div style={{textAlign:'center',padding:'80px',color:'#667eea'}}>Loading change history...</div>;

  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}

      <div style={card}>
        <h3 style={ctitle}>🛡 Audit & Recovery</h3>
        <p style={{color:'#666',fontSize:'13px',marginBottom:'14px'}}>
          Every change to every table is recorded here. If something is deleted by mistake, you can restore it with one click.
          This protection started from {new Date().toLocaleDateString('en-ZA',{day:'numeric',month:'long',year:'numeric'})}.
        </p>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:'10px',marginBottom:'14px'}}>
          <div style={{background:'#e8f5e9',padding:'12px',borderRadius:'8px',textAlign:'center'}}>
            <div style={{fontSize:'22px',fontWeight:700,color:'#28a745'}}>{insertCount}</div>
            <div style={{fontSize:'12px',color:'#666'}}>Records added</div>
          </div>
          <div style={{background:'#fff3e0',padding:'12px',borderRadius:'8px',textAlign:'center'}}>
            <div style={{fontSize:'22px',fontWeight:700,color:'#f97316'}}>{updateCount}</div>
            <div style={{fontSize:'12px',color:'#666'}}>Records updated</div>
          </div>
          <div style={{background:'#ffebee',padding:'12px',borderRadius:'8px',textAlign:'center'}}>
            <div style={{fontSize:'22px',fontWeight:700,color:'#dc3545'}}>{deletedCount}</div>
            <div style={{fontSize:'12px',color:'#666'}}>Deletions (restorable)</div>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'10px'}}>
          <div>
            <label style={lbl}>Table</label>
            <select style={inp} value={filterTable} onChange={e=>setFT(e.target.value)}>
              {AUDIT_TABLES.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Action</label>
            <select style={inp} value={filterOp} onChange={e=>setFO(e.target.value)}>
              <option value="all">All actions</option>
              <option value="INSERT">➕ Inserts</option>
              <option value="UPDATE">✏️ Updates</option>
              <option value="DELETE">🗑 Deletions</option>
            </select>
          </div>
          <div>
            <label style={lbl}>Search</label>
            <input style={inp} placeholder="Name, title..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div style={{display:'flex',alignItems:'flex-end'}}>
            <button style={{...sbtn,background:'#667eea',width:'100%'}} onClick={load}>🔄 Refresh</button>
          </div>
        </div>
      </div>

      {filtered.length===0 ? (
        <div style={card}>
          <p style={{color:'#999',textAlign:'center',padding:'30px'}}>
            {logs.length===0 ? 'No changes recorded yet. Once you start using the app, every change will appear here.' : 'No entries match your filters.'}
          </p>
        </div>
      ) : (
        <div style={card}>
          <div style={{display:'grid',gap:'8px'}}>
            {filtered.map(l=>(
              <div key={l.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'12px 14px',background:'#f8f9fa',borderRadius:'8px',borderLeft:`4px solid ${opColor(l.operation)}`,gap:'10px',flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:'200px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px',flexWrap:'wrap'}}>
                    <span style={{fontSize:'18px'}}>{opIcon(l.operation)}</span>
                    <span style={{background:opColor(l.operation)+'22',color:opColor(l.operation),padding:'2px 8px',borderRadius:'10px',fontSize:'11px',fontWeight:700}}>{l.operation}</span>
                    <span style={{background:'#667eea22',color:'#667eea',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{friendlyTable(l.table_name)}</span>
                    <span style={{fontSize:'11px',color:'#888'}}>{new Date(l.changed_at).toLocaleString('en-ZA')}</span>
                  </div>
                  <div style={{fontWeight:600,color:'#333',fontSize:'14px'}}>{describe(l)}</div>
                  {l.operation==='DELETE' && l.old_data?.barriers && (
                    <div style={{marginTop:'4px'}}>
                      {(l.old_data.barriers||[]).map((b,i)=>(
                        <span key={i} style={{background:'#fff',border:'1px solid #ddd',padding:'1px 6px',borderRadius:'8px',fontSize:'10px',marginRight:'3px',color:'#666'}}>{b}</span>
                      ))}
                    </div>
                  )}
                </div>
                {l.operation==='DELETE' && (
                  <button style={{...sbtn,background:'#28a745',fontSize:'12px',padding:'6px 12px',flexShrink:0}} onClick={()=>restore(l)}>
                    ↩️ Restore
                  </button>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

</script>
</body>
</html>
