  const [termView,setTermView]=useState('Term 2');
  const [msg,setMsg]=useState('');
  const showMsg=m=>{setMsg(m);setTimeout(()=>setMsg(''),5000);};

  const classLearners=selClass?(CLASS_DATA[selClass]||[]):[];
  const termRecords = useMemo(()=>latestReadingRecordsForTerm(reading, termView).filter(r=>r.class_name===selClass),[reading,termView,selClass]);
  const summary = useMemo(()=>summarizeReadingForClass(termRecords, selClass),[termRecords,selClass]);
  const filtered=search.trim()
    ? classLearners.filter(l=>(`${l.surname} ${l.firstname}`).toLowerCase().includes(search.toLowerCase()))
    : classLearners;
  const shownResults = termRecords
    .filter(r=>!search || `${r.surname} ${r.firstname}`.toLowerCase().includes(search.toLowerCase()))
    .slice()
    .sort((a,b)=>a.surname.localeCompare(b.surname)||a.firstname.localeCompare(b.firstname));
  const latestFor=(cls,surname,firstname,term)=>{
    const key = readingKey(cls,surname,firstname,term);
    const recs=reading.filter(r=>readingKey(r.class_name,r.surname,r.firstname,r.term||'')===key);
    if(!recs.length) return null;
    return recs.slice().sort((a,b)=>new Date(b.date_assessed||b.created_at)-new Date(a.date_assessed||a.created_at))[0];
  };
  const summaryCards = selClass ? (
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(170px,1fr))',gap:'10px',marginBottom:'16px'}}>
      <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'12px',padding:'12px 14px'}}>
        <div style={{fontSize:'12px',color:'#64748b',marginBottom:'4px'}}>Learners with scores</div>
        <div style={{fontSize:'22px',fontWeight:700,color:'#334155'}}>{termRecords.length}</div>
      </div>
      <div style={{background:'#eef2ff',border:'1px solid #c7d2fe',borderRadius:'12px',padding:'12px 14px'}}>
        <div style={{fontSize:'12px',color:'#6366f1',marginBottom:'4px'}}>Average score</div>
        <div style={{fontSize:'22px',fontWeight:700,color:'#3730a3'}}>{summary.avgWords!=null?`${summary.avgWords} wpm`:'—'}</div>
      </div>
      <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:'12px',padding:'12px 14px'}}>
        <div style={{fontSize:'12px',color:'#64748b',marginBottom:'4px'}}>Class reading age</div>
        <div style={{fontSize:'22px',fontWeight:700,color:'#334155'}}>{formatReadingAgeYears(summary.avgAgeYears)}</div>
      </div>
      <div style={{background:summary.status.bg,border:`1px solid ${summary.status.fg}22`,borderRadius:'12px',padding:'12px 14px'}}>
        <div style={{fontSize:'12px',color:summary.status.fg,marginBottom:'4px'}}>Desired age by grade</div>
        <div style={{fontSize:'22px',fontWeight:700,color:summary.status.fg}}>{formatReadingAgeYears(summary.targetYears)}</div>
      </div>
      <div style={{background:'#ffffff',border:'1px solid #e2e8f0',borderRadius:'12px',padding:'12px 14px'}}>
        <div style={{fontSize:'12px',color:'#64748b',marginBottom:'6px'}}>Red / Amber / Green</div>
        <div style={{display:'flex',gap:'6px',flexWrap:'wrap'}}>
          <span style={{background:'#fee2e2',color:'#991b1b',padding:'4px 8px',borderRadius:'999px',fontSize:'12px',fontWeight:700}}>R {summary.counts.red}</span>
          <span style={{background:'#fef3c7',color:'#92400e',padding:'4px 8px',borderRadius:'999px',fontSize:'12px',fontWeight:700}}>A {summary.counts.amber}</span>
          <span style={{background:'#dcfce7',color:'#166534',padding:'4px 8px',borderRadius:'999px',fontSize:'12px',fontWeight:700}}>G {summary.counts.green}</span>
        </div>
      </div>
    </div>
  ) : null;

  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}
      <div style={{...card,marginBottom:'14px'}}>
        <h3 style={{...ctitle,marginBottom:'10px'}}>📖 One-Minute Reading Assessment</h3>
        <p style={{color:'#666',fontSize:'13px',marginBottom:'14px'}}>
          Use <strong>Term 2 Results</strong> to view imported class results and reading-age status. Use <strong>Term 3 Entry</strong> to capture the new round of assessments without showing old marks as current entries.
        </p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'12px'}}>
          {!lockClass && (
          <div>
            <label style={lbl}>Class</label>
            <select style={inp} value={selClass} onChange={e=>{setSelClass(e.target.value);setSearch('');}}>
              <option value="">-- Select Class --</option>
              {ASSESS_CLASS_NAMES.map(n=>(<option key={n} value={n}>{n} ({CLASS_DATA[n].length})</option>))}
            </select>
          </div>)}
          <div>
            <label style={lbl}>Search learner</label>
            <input style={inp} placeholder="Type a name to filter..." value={search} onChange={e=>setSearch(e.target.value)} disabled={!selClass}/>
          </div>
        </div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginTop:'14px'}}>
          {['Term 2','Term 3'].map(t=>(
            <button key={t} onClick={()=>setTermView(t)} style={{padding:'9px 14px',borderRadius:'999px',border:termView===t?'none':'1px solid #dbe2f0',background:termView===t?'linear-gradient(135deg,#667eea,#764ba2)':'#f8fafc',color:termView===t?'white':'#475569',fontWeight:700,cursor:'pointer'}}>
              {t==='Term 2'?'Term 2 Results':'Term 3 Entry'}
            </button>
          ))}
        </div>
      </div>

      {selClass && (
        <div style={card}>
          <h3 style={ctitle}>{selClass} — {termView==='Term 2'?'Term 2 Results':'Term 3 Entry'}</h3>
          {summaryCards}
          <div style={{fontSize:'13px',margin:'-4px 0 16px',color:summary.status.fg}}>
            Class reading age is <strong>{formatReadingAgeYears(summary.avgAgeYears)}</strong>. Desired chronological reading age for <strong>{selClass}</strong> is <strong>{formatReadingAgeYears(summary.targetYears)}</strong>.
          </div>
          {termView==='Term 2' ? (
            shownResults.length===0 ? (
              <p style={{color:'#999',textAlign:'center',padding:'20px'}}>No Term 2 reading results were found for this class.</p>
            ) : (
              <div style={{display:'grid',gap:'8px'}}>
                {shownResults.map((r,i)=>{
                  const ageLabel = readingAgeLabelForRecord(r);
                  const status = readingStatusFor(selClass, ageLabel);
                  return (
                    <div key={r.id||i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',background:status.bg,borderRadius:'10px',borderLeft:`5px solid ${status.fg}`,gap:'10px',flexWrap:'wrap'}}>
                      <div style={{flex:1,minWidth:'220px'}}>
                        <div style={{fontWeight:700,color:'#333',fontSize:'14px'}}>{r.surname}, {r.firstname}</div>
                        <div style={{fontSize:'12px',color:'#475569',marginTop:'3px'}}>
                          {r.words_correct} words/min · Reading age <strong>{ageLabel||'—'}</strong> · Desired age <strong>{formatReadingAgeYears(status.target)}</strong>
                        </div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                        <span style={{background:'rgba(255,255,255,0.75)',color:status.fg,padding:'5px 10px',borderRadius:'999px',fontSize:'12px',fontWeight:700}}>{status.label}</span>
                        <span style={{fontSize:'12px',color:'#64748b'}}>{new Date(r.date_assessed||r.created_at).toLocaleDateString('en-ZA')}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )
          ) : filtered.length===0 ? (
            <p style={{color:'#999',textAlign:'center',padding:'20px'}}>No learners match your search.</p>
          ) : (
            <div style={{display:'grid',gap:'8px'}}>
              {filtered.map((l,i)=>{
                const existing=latestFor(selClass,l.surname,l.firstname,'Term 3');
                const ageLabel = readingAgeLabelForRecord(existing);
                const status = existing ? readingStatusFor(selClass, ageLabel) : {bg:'#f8f9fa',fg:'#64748b',label:'No Term 3 mark yet'};
                return (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',background:existing?status.bg:'#f8f9fa',borderRadius:'10px',borderLeft:`5px solid ${existing?status.fg:'#cbd5e1'}`,gap:'10px',flexWrap:'wrap'}}>
                    <div style={{flex:1,minWidth:'180px'}}>
                      <div style={{fontWeight:600,color:'#333',fontSize:'14px'}}>{l.surname}, {l.firstname}</div>
                      {existing ? (
                        <div style={{fontSize:'12px',color:status.fg,marginTop:'2px'}}>
                          ✓ {existing.words_correct} words/min · Term 3 · {new Date(existing.date_assessed||existing.created_at).toLocaleDateString('en-ZA')} · reading age {ageLabel||'—'}
                        </div>
                      ) : (
                        <div style={{fontSize:'12px',color:'#64748b',marginTop:'2px'}}>No Term 3 mark captured yet.</div>
                      )}
                    </div>
                    <div style={{display:'flex',gap:'8px',flexShrink:0,flexWrap:'wrap'}}>
                      <button style={{...sbtn,background:existing?'#667eea':'#f97316',fontSize:'13px'}} onClick={()=>setEditing({...l,existing:existing||null})}>
                        {existing?'✏️ View / Re-test':'+ Start Term 3'}
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {editing && (
        <ReadingAssessmentModal
          learner={editing}
          className={selClass}
          phase={phaseForClass(selClass)}
          forcedTerm={termView}
          onClose={()=>setEditing(null)}
          onSaved={(record,isUpdate)=>{
            setReading(p=>isUpdate?p.map(r=>r.id===record.id?record:r):[record,...p]);
            showMsg(isUpdate?'✓ Reading result updated.':'✓ Reading result saved.');
            setEditing(null);
          }}
          onDelete={(id)=>{
            setReading(p=>p.filter(r=>r.id!==id));
            showMsg('✓ Reading result deleted.');
            setEditing(null);
          }}
        />
      )}
    </div>
  );
}

function ReadingAssessmentModal({learner,className,phase,forcedTerm,onClose,onSaved,onDelete}){
  const existing=learner.existing;
  const isUpdate=!!existing;
  const DURATION=60;

  const [secs,setSecs]=useState(DURATION);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const intervalRef=useRef(null);

  const [words,setWords]=useState(existing&&existing.words_correct!=null?String(existing.words_correct):'');
  const [errs,setErrs]=useState(existing&&existing.errors!=null?String(existing.errors):'');
  const [term,setTerm]=useState((existing&&existing.term)||forcedTerm||'Term 3');
  const [notes,setNotes]=useState((existing&&existing.notes)||'');
  const [busy,setBusy]=useState(false);

  useEffect(()=>{ if(forcedTerm) setTerm(forcedTerm); },[forcedTerm]);

  useEffect(()=>()=>{ if(intervalRef.current) clearInterval(intervalRef.current); },[]);

  const beep=()=>{ try{ const A=window.AudioContext||window.webkitAudioContext; const a=new A(); const o=a.createOscillator(); const g=a.createGain(); o.connect(g); g.connect(a.destination); o.frequency.value=880; g.gain.value=0.15; o.start(); setTimeout(()=>{o.stop();a.close();},450);}catch(e){} };
  const tick=()=>{
    setSecs(s=>{
      if(s<=1){
        if(intervalRef.current){clearInterval(intervalRef.current);intervalRef.current=null;}
        setRunning(false); setDone(true); beep();
        return 0;
      }
      return s-1;
    });
  };
  const start=()=>{ if(running||done) return; setRunning(true); intervalRef.current=setInterval(tick,1000); };
  const pause=()=>{ setRunning(false); if(intervalRef.current){clearInterval(intervalRef.current);intervalRef.current=null;} };
  const reset=()=>{ pause(); setSecs(DURATION); setDone(false); };

  const mm=String(Math.floor(secs/60)).padStart(2,'0');
  const ss=String(secs%60).padStart(2,'0');
  const wordsNum=parseInt(words,10);
  const age=readingAgeFromWords(isNaN(wordsNum)?null:wordsNum);
  const timerColor=done?'#28a745':(secs<=10&&running?'#dc3545':'#667eea');

  const handleSave=async()=>{
    if(words===''||isNaN(wordsNum)||wordsNum<0){ alert('Please enter the number of words read correctly.'); return; }
    setBusy(true);
    try{
      const payload={
        surname:learner.surname, firstname:learner.firstname, class_name:className,
        phase, term, year:new Date().getFullYear(),
        words_correct:wordsNum,
        errors:(errs===''||isNaN(parseInt(errs,10)))?null:parseInt(errs,10),
        reading_age:age, duration_seconds:DURATION,
        notes:notes.trim()||null, assessed_by:(existing&&existing.assessed_by)||'Admin',
        date_assessed:(existing&&existing.date_assessed)||new Date().toISOString().split('T')[0],
        updated_at:new Date().toISOString()
      };
      if(isUpdate){
        const rows=await db.patch('carissa_reading_assessments',`id=eq.${existing.id}`,payload);
        onSaved(rows[0],true);
      }else{
        const rows=await db.post('carissa_reading_assessments',payload);
        onSaved(rows[0],false);
      }
    }catch(e){ alert('Error saving: '+e.message); }
    setBusy(false);
  };

  const handleDelete=async()=>{
    if(!confirm('Delete this reading result? This cannot be undone.')) return;
    setBusy(true);
    try{ await db.del('carissa_reading_assessments',`id=eq.${existing.id}`); onDelete(existing.id); }
    catch(e){ alert('Error: '+e.message); }
    setBusy(false);
  };

  return (
    <div style={ovly} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={mdl}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
          <h3 style={{margin:0,color:'#667eea',fontSize:'18px'}}>📖 One-Minute Reading</h3>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:'22px',cursor:'pointer',color:'#999'}}>×</button>
        </div>
        <p style={{margin:'0 0 16px',color:'#333',fontWeight:600}}>{learner.surname}, {learner.firstname} <span style={{color:'#999',fontWeight:400,fontSize:'13px'}}>· {className}</span></p>

        <div style={{textAlign:'center',background:'#f8f9fa',borderRadius:'14px',padding:'20px',marginBottom:'18px'}}>
          <div style={{fontSize:'56px',fontWeight:700,letterSpacing:'2px',color:timerColor,fontVariantNumeric:'tabular-nums'}}>{mm}:{ss}</div>
          <div style={{fontSize:'13px',color:'#888',marginBottom:'14px'}}>{done?"Time's up — record the score below":(running?'Reading…':'Ready')}</div>
          <div style={{display:'flex',gap:'8px',justifyContent:'center',flexWrap:'wrap'}}>
            {!running && !done && secs===DURATION && <button style={{...sbtn,background:'#28a745'}} onClick={start}>▶ Start</button>}
            {!running && !done && secs<DURATION && <button style={{...sbtn,background:'#28a745'}} onClick={start}>▶ Resume</button>}
            {running && <button style={{...sbtn,background:'#f59e0b'}} onClick={pause}>⏸ Pause</button>}
            <button style={{...sbtn,background:'#64748b'}} onClick={reset}>↻ Reset</button>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'12px'}}>
          <div>
            <label style={lbl}>Words read correctly</label>
            <input style={inp} type="number" min="0" value={words} onChange={e=>setWords(e.target.value)} placeholder="e.g. 48"/>
          </div>
          <div>
            <label style={lbl}>Errors (optional)</label>
            <input style={inp} type="number" min="0" value={errs} onChange={e=>setErrs(e.target.value)} placeholder="e.g. 3"/>
          </div>
        </div>
        {age && <div style={{background:'#eef2ff',color:'#3730a3',borderRadius:'8px',padding:'8px 12px',fontSize:'13px',marginBottom:'12px'}}>Approx. reading age: <strong>{age}</strong> <span style={{color:'#6b7280'}}>(guide only)</span></div>}

        <div style={{marginBottom:'12px'}}>
          <label style={lbl}>Term</label>
          {forcedTerm ? (
            <div style={{...inp,background:'#f8fafc',color:'#334155'}}>{term}</div>
          ) : (
            <select style={inp} value={term} onChange={e=>setTerm(e.target.value)}>
              {READING_TERMS.map(t=>(<option key={t} value={t}>{t}</option>))}
            </select>
          )}
        </div>
        <div style={{marginBottom:'16px'}}>
          <label style={lbl}>Notes (optional)</label>
          <textarea style={{...inp,minHeight:'60px',resize:'vertical'}} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Fluency, expression, difficulties…"/>
        </div>

        <div style={{display:'flex',gap:'8px',justifyContent:'space-between',flexWrap:'wrap'}}>
          <div>{isUpdate && <button style={{...sbtn,background:'#dc3545'}} disabled={busy} onClick={handleDelete}>🗑 Delete</button>}</div>
          <div style={{display:'flex',gap:'8px'}}>
            <button style={{...sbtn,background:'#94a3b8'}} disabled={busy} onClick={onClose}>Cancel</button>
            <button style={sbtn} disabled={busy} onClick={handleSave}>{busy?'Saving…':(isUpdate?'Update':'Save')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   ADMIN DASHBOARD: READING RESULTS TAB (NEW)

function ReadingResultsTab({reading}){
  const [filterClass,setFilterClass]=useState('all');
  const [termFilter,setTermFilter]=useState('Term 2');
  const [search,setSearch]=useState('');

  const latest = useMemo(()=>{
    return latestReadingRecordsForTerm(reading, termFilter);
  },[reading,termFilter]);

  const perClass = useMemo(()=>ASSESS_CLASS_NAMES.map(cn=>{
    const recs=latest.filter(r=>r.class_name===cn);
    const total=(CLASS_DATA[cn]||[]).length;
    const summary=summarizeReadingForClass(recs, cn);
    return {cn,assessed:recs.length,total,avg:summary.avgWords,avgAgeYears:summary.avgAgeYears,targetYears:summary.targetYears,status:summary.status};
  }),[latest]);

  const shown = latest
    .filter(r=>filterClass==='all'||r.class_name===filterClass)
    .filter(r=>{
      if(!search) return true;
      return (`${r.surname} ${r.firstname}`).toLowerCase().includes(search.toLowerCase());
    })
    .sort((a,b)=>a.class_name.localeCompare(b.class_name,undefined,{numeric:true})||a.surname.localeCompare(b.surname));

  const exportExcel = ()=>{
    const data = shown.map(r=>({
      'Class':r.class_name,'Surname':r.surname,'First Name':r.firstname,
      'Words/Min':r.words_correct,'Approx Reading Age':readingAgeLabelForRecord(r)||'',
      'Desired Age':formatReadingAgeYears(classTargetReadingAgeYears(r.class_name)),
      'Status':readingStatusFor(r.class_name, readingAgeLabelForRecord(r)).label,
      'Term':r.term||'','Date Assessed':new Date(r.date_assessed||r.created_at).toLocaleDateString('en-ZA')
    }));
    const ws=XLSX.utils.json_to_sheet(data);
    ws['!cols']=[{wch:12},{wch:18},{wch:16},{wch:10},{wch:16},{wch:14},{wch:16},{wch:10},{wch:14}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Reading Results');
    XLSX.writeFile(wb,`Carissa_Reading_${termFilter.replace(/\s+/g,'_')}_Results.xlsx`);
  };

  return (
    <div>
      <div style={{...card,marginBottom:'14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px',marginBottom:'6px'}}>
          <h2 style={{color:'#333'}}>📖 Reading Results — All Classes</h2>
          <button onClick={exportExcel} disabled={!shown.length} style={{padding:'9px 14px',borderRadius:'8px',border:'none',background:'linear-gradient(135deg,#667eea,#764ba2)',color:'white',fontWeight:600,cursor:shown.length?'pointer':'not-allowed',opacity:shown.length?1:.5}}>⬇ Export to Excel</button>
        </div>
        <p style={{color:'#888',fontSize:'13px',marginBottom:'16px'}}>Final one-minute reading scores captured by the class teachers. Term summaries are colour coded against the expected chronological reading age for each grade.</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:'10px'}}>
          {perClass.map(c=>(
            <div key={c.cn} onClick={()=>setFilterClass(filterClass===c.cn?'all':c.cn)}
              style={{cursor:'pointer',padding:'12px',borderRadius:'10px',textAlign:'center',
                background:filterClass===c.cn?'linear-gradient(135deg,#667eea,#764ba2)':c.status.bg,
                color:filterClass===c.cn?'white':c.status.fg,
                border:filterClass===c.cn?'none':'1px solid #e3e6f0'}}>
              <div style={{fontWeight:700,fontSize:'14px'}}>{c.cn}</div>
              <div style={{fontSize:'12px',opacity:.85,marginTop:'3px'}}>{c.assessed}/{c.total} assessed</div>
              <div style={{fontSize:'13px',fontWeight:600,marginTop:'2px'}}>{c.avg!==null?`avg ${c.avg} wpm`:'—'}</div>
              <div style={{fontSize:'12px',opacity:.85,marginTop:'2px'}}>{formatReadingAgeYears(c.avgAgeYears)} / target {formatReadingAgeYears(c.targetYears)}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={card}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'12px',marginBottom:'14px'}}>
          <div>
            <label style={lbl}>Term</label>
            <select style={inp} value={termFilter} onChange={e=>setTermFilter(e.target.value)}>
              {READING_TERMS.map(t=><option key={t} value={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Class</label>
            <select style={inp} value={filterClass} onChange={e=>setFilterClass(e.target.value)}>
              <option value="all">All classes</option>
              {ASSESS_CLASS_NAMES.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Search learner</label>
            <input style={inp} placeholder="Type a name to filter..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
        </div>
        {shown.length===0
          ? <p style={{color:'#999',textAlign:'center',padding:'30px'}}>No reading scores recorded yet for {termFilter}{filterClass!=='all'?` in ${filterClass}`:''}. Scores appear here as class teachers complete their one-minute assessments.</p>
          : <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'14px'}}>

                      {(()=>{

                        const status = readingStatusFor(r.class_name, ageLabel);
                        return <>
                      <td style={{padding:'9px 8px',whiteSpace:'nowrap'}}>{r.class_name}</td>
                      <td style={{padding:'9px 8px',fontWeight:600,color:'#333'}}>{r.surname}</td>
                      <td style={{padding:'9px 8px'}}>{r.firstname}</td>
                      <td style={{padding:'9px 8px',fontWeight:700,color:'#4c51bf'}}>{r.words_correct}</td>
                      <td style={{padding:'9px 8px'}}>{ageLabel||'—'}</td>
                      <td style={{padding:'9px 8px'}}>{formatReadingAgeYears(status.target)}</td>
                      <td style={{padding:'9px 8px'}}>
                        <span style={{background:status.bg,color:status.fg,padding:'4px 8px',borderRadius:'999px',fontSize:'12px',fontWeight:700}}>{status.label}</span>
                      </td>
                      <td style={{padding:'9px 8px'}}>{r.term||'—'}</td>
                      <td style={{padding:'9px 8px',whiteSpace:'nowrap',color:'#777'}}>{new Date(r.date_assessed||r.created_at).toLocaleDateString('en-ZA')}</td>
                        </>;
                      })()}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>}
      </div>
    </div>
  );
}

function TeacherRegistrationsTab(){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');

  const load = useCallback(async()=>{
    setLoading(true);
    try{
      const data = await db.get('carissa_teacher_registrations','order=created_at.desc');
      setRows(data);
    }catch(e){ console.error(e); alert('Could not load registrations: '+e.message); }
    setLoading(false);
  },[]);
  useEffect(()=>{ load(); },[load]);

  // Emails appearing more than once (so duplicates are easy to spot)
  const dupEmails = useMemo(()=>{
    const c={};
    rows.forEach(r=>{ const e=(r.email||'').toLowerCase(); c[e]=(c[e]||0)+1; });
    return new Set(Object.keys(c).filter(e=>c[e]>1));
  },[rows]);

  const filtered = rows.filter(r=>{
    if(!search) return true;
    const s=search.toLowerCase();
    return [r.first_name,r.surname,r.class_name,r.whatsapp,r.email].some(v=>(v||'').toLowerCase().includes(s));
  });

  const registeredClasses = new Set(rows.map(r=>r.class_name));
  const missing = CLASS_NAMES.filter(c=>!registeredClasses.has(c));

  const createLogin = async(r)=>{
    const isNew = !r.pin;
    if(!isNew && !confirm(`${r.first_name} ${r.surname} already has a PIN. Generate a NEW one?\n\nThe old PIN will stop working.`)) return;
    const pin = String(Math.floor(10000 + Math.random()*90000));
    try{
      await db.patch('carissa_teacher_registrations',`id=eq.${r.id}`,{pin, login_enabled:true, updated_at:new Date().toISOString()});
      setRows(prev=>prev.map(x=>x.id===r.id?{...x,pin,login_enabled:true}:x));
      alert(`Login ${isNew?'created':'regenerated'} for ${r.first_name} ${r.surname} (${r.class_name}).\n\nEmail: ${r.email}\nPIN: ${pin}\n\nPlease send these details to the teacher.`);
    }catch(e){ alert('Could not save the PIN: '+e.message); }
  };

  const handleDelete = async(r)=>{
    if(!confirm(`Delete the registration for ${r.first_name} ${r.surname} (${r.class_name})?\n\nThis cannot be undone.`)) return;
    try{
      await db.del('carissa_teacher_registrations',`id=eq.${r.id}`);
      setRows(prev=>prev.filter(x=>x.id!==r.id));
    }catch(e){ alert('Delete failed: '+e.message); }
  };

  const exportExcel = ()=>{
    const data = rows.map(r=>({
      'First Name':r.first_name,'Surname':r.surname,'Class':r.class_name,
      'WhatsApp':r.whatsapp,'Email':r.email,
      'Login PIN':r.pin||'',
      'Submitted':new Date(r.created_at).toLocaleString('en-ZA')
    }));
    const ws = XLSX.utils.json_to_sheet(data);
    ws['!cols']=[{wch:16},{wch:18},{wch:18},{wch:16},{wch:30},{wch:10},{wch:20}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Teacher Registrations');
    XLSX.writeFile(wb, 'Carissa_Teacher_Registrations.xlsx');
  };

  if(loading) return <div style={{textAlign:'center',padding:'60px',color:'#667eea'}}>Loading registrations...</div>;

  return (
    <div style={card}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px',marginBottom:'6px'}}>
        <h2 style={{color:'#333'}}>🧑‍🏫 Teacher Registrations ({rows.length})</h2>
        <div style={{display:'flex',gap:'8px'}}>
          <button onClick={load} style={{padding:'9px 14px',borderRadius:'8px',border:'2px solid #667eea',background:'white',color:'#667eea',fontWeight:600,cursor:'pointer'}}>🔄 Refresh</button>
          <button onClick={exportExcel} disabled={!rows.length} style={{padding:'9px 14px',borderRadius:'8px',border:'none',background:'linear-gradient(135deg,#667eea,#764ba2)',color:'white',fontWeight:600,cursor:rows.length?'pointer':'not-allowed',opacity:rows.length?1:.5}}>⬇ Export to Excel</button>
        </div>
      </div>
      <p style={{color:'#888',fontSize:'13px',marginBottom:'14px'}}>
        Every submission from the registration form is saved here.
        {missing.length>0
          ? ` Still awaiting: ${missing.join(', ')}.`
          : ' All classes have registered. 🎉'}
      </p>

      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name, class, number or email..."
        style={{width:'100%',padding:'11px 14px',border:'2px solid #e3e6f0',borderRadius:'10px',marginBottom:'14px',fontSize:'14px'}}/>

      {filtered.length===0
        ? <div style={{textAlign:'center',color:'#999',padding:'40px 0'}}>{rows.length===0?'No registrations yet. Share the form link with the staff to get started.':'No registrations match your search.'}</div>
        : <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'14px'}}>
              <thead>
                <tr style={{background:'#f5f6ff',color:'#555',textAlign:'left'}}>
                  {['#','First Name','Surname','Class','WhatsApp','Email','Login','Submitted',''].map((h,i)=>
                    <th key={i} style={{padding:'10px 8px',borderBottom:'2px solid #e3e6f0',whiteSpace:'nowrap'}}>{h}</th>)}
                </tr>
              </thead>
              <tbody>
                {filtered.map((r,i)=>{
                  const dup = dupEmails.has((r.email||'').toLowerCase());
                  return (
                    <tr key={r.id} style={{background: dup?'#fff8e6': i%2?'#fafbff':'white'}}>
                      <td style={{padding:'9px 8px',color:'#999'}}>{i+1}</td>
                      <td style={{padding:'9px 8px',fontWeight:600,color:'#333'}}>{r.first_name}</td>
                      <td style={{padding:'9px 8px',fontWeight:600,color:'#333'}}>{r.surname}</td>
                      <td style={{padding:'9px 8px'}}>{r.class_name}</td>
                      <td style={{padding:'9px 8px',whiteSpace:'nowrap'}}>{r.whatsapp}</td>
                      <td style={{padding:'9px 8px'}}>{r.email}{dup && <span title="This email appears more than once" style={{marginLeft:'6px'}}>⚠️</span>}</td>
                      <td style={{padding:'9px 8px',whiteSpace:'nowrap'}}>
                        {r.pin
                          ? <span>
                              <code style={{background:'#eef1ff',color:'#4c51bf',padding:'3px 8px',borderRadius:'6px',fontWeight:700,letterSpacing:'1px'}}>{r.pin}</code>
                              <button onClick={()=>createLogin(r)} title="Generate a new PIN" style={{border:'none',background:'transparent',cursor:'pointer',marginLeft:'4px'}}>↻</button>
                            </span>
                          : <button onClick={()=>createLogin(r)} style={{padding:'5px 10px',borderRadius:'7px',border:'none',background:'linear-gradient(135deg,#667eea,#764ba2)',color:'white',fontSize:'12px',fontWeight:600,cursor:'pointer'}}>🔑 Create login</button>}
                      </td>
                      <td style={{padding:'9px 8px',whiteSpace:'nowrap',color:'#777'}}>{new Date(r.created_at).toLocaleDateString('en-ZA')} {new Date(r.created_at).toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'})}</td>
                      <td style={{padding:'9px 8px'}}>
                        <button onClick={()=>handleDelete(r)} title="Delete this entry" style={{border:'none',background:'transparent',cursor:'pointer',fontSize:'15px'}}>🗑</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>}
    </div>
  );
}

function CoordinatorView({onEditName,onDelete}){
  const [data,setData]=useState([]);

  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');

  useEffect(()=>{
    (async()=>{
      try{
        const d = await db.get('carissa_interventions','order=class_name.asc,surname.asc');
        setData(d);
      }catch(e){console.error(e);}
      setLoading(false);
    })();
  },[]);

  const filtered = data.filter(r=>{
    const mb = filter==='all' || normalizeBarrierList(r.barriers).includes(filter);
    const ms = !search.trim() || (`${r.surname} ${r.firstname} ${r.class_name}`).toLowerCase().includes(search.toLowerCase());
    return mb && ms;
  });

  const exportExcel = () => {
    if(filtered.length===0){alert('Nothing to export');return;}
    const rows = filtered.map(r=>({
      'Class': r.class_name,
      'Surname': r.surname,
      'First Name': r.firstname,
      'Barriers': normalizeBarrierList(r.barriers).join(', '),
      'Teacher': r.teacher_name,
      'WhatsApp': r.teacher_whatsapp,
      'Comments': r.comments||'',
      'Date Added': r.date_added ? new Date(r.date_added).toLocaleDateString('en-ZA') : ''
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Interventions');
    XLSX.writeFile(wb, `Carissa_Interventions_${new Date().toISOString().split('T')[0]}.xlsx`);
  };

  const handleDel = async (r) => {
    if(!confirm(`Remove ${r.firstname} ${r.surname} from the intervention list?`)) return;
    try{
      await db.del('carissa_interventions',`id=eq.${r.id}`);
      setData(p=>p.filter(x=>x.id!==r.id));
    }catch(e){alert('Error: '+e.message);}
  };

  if(loading) return <div style={{textAlign:'center',padding:'80px',color:'#667eea'}}>Loading...</div>;

  return (
    <div>
      <div style={card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px',marginBottom:'14px'}}>
          <h3 style={{...ctitle,marginBottom:0}}>Intervention List ({data.length})</h3>
          <button style={btn} onClick={exportExcel}>📊 Export to Excel</button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'10px',marginBottom:'14px'}}>
          <div>
            <label style={lbl}>Filter by intervention</label>
            <select style={inp} value={filter} onChange={e=>setFilter(e.target.value)}>
              {BARRIER_FILTERS.map(f=><option key={f.value} value={f.value}>{f.label}</option>)}

          </div>
          <div>
            <label style={lbl}>Search</label>
            <input style={inp} placeholder="Search name or class..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
        </div>
      </div>

      {filtered.length===0 ? (
        <div style={card}><p style={{color:'#999',textAlign:'center',padding:'30px'}}>No matching entries.</p></div>
      ) : (
        <div style={card}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
              <thead>
                <tr style={{borderBottom:'2px solid #eee',background:'#f8f9fa'}}>
                  {['Class','Learner','Interventions','Teacher','Comments','Actions'].map(h=>(

                    <td style={{padding:'10px',fontWeight:600}}>{r.surname}, {r.firstname}</td>
                    <td style={{padding:'10px'}}>
                      {normalizeBarrierList(r.barriers).map((b,i)=>(
                        <span key={i} style={{background:'#667eea22',color:'#667eea',padding:'2px 6px',borderRadius:'8px',fontSize:'11px',marginRight:'3px',display:'inline-block',marginBottom:'2px'}}>{b}</span>
                      ))}

                    <td style={{padding:'10px'}}>{r.teacher_name}<br/><span style={{fontSize:'11px',color:'#888'}}>{r.teacher_whatsapp}</span></td>
                    <td style={{padding:'10px',maxWidth:'200px',fontSize:'12px',color:'#666'}}>{r.comments}</td>
                    <td style={{padding:'10px',whiteSpace:'nowrap'}}>
                      <button style={{...sbtn,background:'#667eea',fontSize:'11px',padding:'5px 10px',marginRight:'4px'}} onClick={()=>onEditName(r,(s,f)=>setData(p=>p.map(x=>x.id===r.id?{...x,surname:s,firstname:f}:x)))}>✏️</button>
                      <button style={{...sbtn,background:'#dc3545',fontSize:'11px',padding:'5px 10px'}} onClick={()=>handleDel(r)}>🗑</button>
                    </td>

/* ════════════════════════════════════════════════════════════════
   TEACHER VIEW - register teacher, add intervention learners
   ════════════════════════════════════════════════════════════════ */
function TeacherView({onEditName}){
  const [step,setStep]=useState('class'); // class -> teacher -> learners
  const [selClass,setSelClass]=useState('');
  const [teacher,setTeacher]=useState({name:'',whatsapp:''});
  const [modalFor,setModalFor]=useState(null); // learner being added to intervention
  const [interventions,setInts]=useState([]); // for this class
  const [msg,setMsg]=useState('');
  const showMsg = m => {setMsg(m);setTimeout(()=>setMsg(''),5000);};

  // Load any existing interventions for the chosen class (after we know the class)
  useEffect(()=>{
    if(!selClass) return;
    (async()=>{
      try{
        const d = await db.get('carissa_interventions',`class_name=eq.${encodeURIComponent(selClass)}&order=surname.asc`);
        setInts(d);
      }catch(e){console.error(e);}
    })();
  },[selClass]);

  // Also try to autofill teacher info from carissa_teachers
  useEffect(()=>{
    if(!selClass) return;
    (async()=>{
      try{
        const d = await db.get('carissa_teachers',`class_name=eq.${encodeURIComponent(selClass)}`);
        if(d.length>0) setTeacher({name:d[0].teacher_name||'',whatsapp:d[0].whatsapp||''});
      }catch(e){console.error(e);}
    })();
  },[selClass]);

  const proceedTeacher = async () => {
    if(!teacher.name.trim()||!teacher.whatsapp.trim()){alert('Please enter your name and WhatsApp.');return;}
    try{
      await db.post('carissa_teachers',{class_name:selClass,teacher_name:teacher.name.trim(),whatsapp:teacher.whatsapp.trim()},'resolution=merge-duplicates,return=minimal');
    }catch(e){console.error(e);}
    setStep('learners');
  };

  const saveIntervention = async (barriers,comments) => {
    if(!modalFor) return;
    try{
      const row = {
        surname: modalFor.surname,
        firstname: modalFor.firstname,
        class_name: selClass,
        barriers: normalizeBarrierList(barriers),
        comments: comments.trim() || null,
        teacher_name: teacher.name.trim(),
        teacher_whatsapp: teacher.whatsapp.trim()
      };
      const created = await db.post('carissa_interventions',row);
      setInts(p=>[created[0],...p]);
      setModalFor(null);
      showMsg(`✓ ${modalFor.firstname} ${modalFor.surname} added to intervention list.`);
    }catch(e){alert('Error: '+e.message);}
  };

  const learners = selClass ? (CLASS_DATA[selClass]||[]) : [];

  // STEP 1: pick class
  if(step==='class'){
    return (
      <div style={card}>
        <h3 style={ctitle}>Welcome, Teacher</h3>
        <p style={{color:'#666',fontSize:'14px',marginBottom:'14px'}}>Select your class to begin.</p>
        <select style={inp} value={selClass} onChange={e=>setSelClass(e.target.value)}>
          <option value="">-- Select Class --</option>
          {CLASS_NAMES.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
        <button style={{...btn,marginTop:'14px'}} onClick={()=>{if(!selClass){alert('Pick a class');return;}setStep('teacher');}}>Continue →</button>
      </div>
    );
  }

  // STEP 2: teacher info
  if(step==='teacher'){
    return (
      <div style={card}>
        <h3 style={ctitle}>Your Details — {selClass}</h3>
        <div style={{marginBottom:'12px'}}>
          <label style={lbl}>Your Name</label>
          <input style={inp} value={teacher.name} onChange={e=>setTeacher(p=>({...p,name:e.target.value}))} placeholder="Full name"/>
        </div>
        <div style={{marginBottom:'14px'}}>
          <label style={lbl}>WhatsApp Number</label>
          <input style={inp} value={teacher.whatsapp} onChange={e=>setTeacher(p=>({...p,whatsapp:e.target.value}))} placeholder="e.g. 082 ..."/>
        </div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <button style={btn} onClick={proceedTeacher}>Continue →</button>
          <button style={{...btn,background:'#6c757d'}} onClick={()=>setStep('class')}>← Back</button>
        </div>
      </div>
    );
  }

  // STEP 3: learner list
  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}
      <div style={card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px',marginBottom:'10px'}}>
          <div>
            <h3 style={{...ctitle,marginBottom:'2px'}}>{selClass}</h3>
            <p style={{fontSize:'13px',color:'#666'}}>{teacher.name} · {teacher.whatsapp}</p>
          </div>
          <button style={{...sbtn,background:'#6c757d'}} onClick={()=>setStep('class')}>↩ Change class</button>
        </div>
        <p style={{fontSize:'13px',color:'#666',marginBottom:'14px'}}>Click <strong>+ Add</strong> next to any learner you'd like to flag for intervention.</p>
        <div style={{display:'grid',gap:'6px'}}>
          {learners.map((l,i)=>{
            const onList = interventions.some(iv => learnerKey(iv)===learnerKey({...l,class_name:selClass}));
            return (
              <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 12px',background:onList?'#fff3e0':'#f8f9fa',borderRadius:'8px',borderLeft:`4px solid ${onList?'#f97316':'#cbd5e1'}`}}>
                <div style={{fontSize:'14px',color:'#333'}}>
                  <strong>{l.surname}</strong>, {l.firstname}
                  {onList && <span style={{marginLeft:'10px',fontSize:'12px',color:'#f97316'}}>● On intervention list</span>}
                </div>
                {!onList && (
                  <button style={{...sbtn,background:'#667eea',fontSize:'12px',padding:'5px 12px'}} onClick={()=>setModalFor(l)}>+ Add</button>
                )}
              </div>
            );
          })}
        </div>
      </div>

      {modalFor && <RemedialModal learner={modalFor} onSave={saveIntervention} onClose={()=>setModalFor(null)}/>}
    </div>
  );
}

   ════════════════════════════════════════════════════════════════ */
// Session created by teacher.html (Teacher Portal login page)
const TEACHER_SESSION_KEY = 'carissa_teacher_session';
const TEACHER_REMEMBER_KEY = 'carissa_teacher_session_persistent';
const loadTeacherSession = () => {
  try{
    const remembered = localStorage.getItem(TEACHER_REMEMBER_KEY);
    if(remembered) return JSON.parse(remembered);
  }catch(e){}
  try{
    const sessionOnly = sessionStorage.getItem(TEACHER_SESSION_KEY);
    if(sessionOnly) return JSON.parse(sessionOnly);
  }catch(e){}
  return null;
};
const saveTeacherSession = (session, rememberDevice) => {
  try{ sessionStorage.removeItem(TEACHER_SESSION_KEY); }catch(e){}
  try{ localStorage.removeItem(TEACHER_REMEMBER_KEY); }catch(e){}
  if(!session) return;
  try{
    const payload = JSON.stringify(session);
    if(rememberDevice) localStorage.setItem(TEACHER_REMEMBER_KEY, payload);
    else sessionStorage.setItem(TEACHER_SESSION_KEY, payload);
  }catch(e){}
};
let TEACHER_SESSION = loadTeacherSession();
// Teacher portal mode: /?portal=teacher opens LearnWorld directly as the teacher dashboard
let PORTAL_MODE = false;
try{ PORTAL_MODE = new URLSearchParams(window.location.search).get('portal')==='teacher'; }catch(e){}

function App(){

      applyLearnerOverridesToClassData(ovr);
      setOverridesReady(true);
    })();

  const switchTo = (m) => {

  if(!overridesReady){
    return <div style={{display:'flex',justifyContent:'center',alignItems:'center',minHeight:'100vh',color:'#667eea',fontSize:'16px'}}>Loading…</div>;
  }

  return (

            <div>

              <div style={{fontSize:'12px',opacity:0.9}}>Remedial support & eLearning assessments</div>
            </div>
          </div>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap',alignItems:'center'}}>
            {!TEACHER_SESSION && !PORTAL_MODE && <button onClick={()=>switchTo('learnworld')} style={{padding:'8px 16px',borderRadius:'20px',border:'1px solid rgba(255,255,255,0.5)',color:'white',fontSize:'13px',fontWeight:600,background:mode==='learnworld'?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.1)',cursor:'pointer'}}>🌐 LearnWorld</button>}
            {isAdmin && <span style={{padding:'8px 14px',borderRadius:'20px',background:'rgba(255,255,255,0.2)',fontSize:'13px',fontWeight:600}}>🔓 Admin</span>}
          </div>
        </div>
      </header>

      {/* MODE TABS */}
      <div style={{maxWidth:'1300px',margin:'14px auto 0',padding:'0 16px'}}>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap',background:'white',padding:'8px',borderRadius:'12px',boxShadow:'0 4px 14px rgba(0,0,0,0.06)'}}>
          {((TEACHER_SESSION || PORTAL_MODE) ? [] : [
            ['teacher','👩‍🏫 Teacher'],
            ['coordinator','📋 Coordinator'],
            ['learnworld','🌐 LearnWorld'],
            ['admin','🔐 Admin Dashboard']
          ]).map(([k,l])=>(
            <button key={k} onClick={()=>switchTo(k)} style={{padding:'12px 18px',borderRadius:'8px',border:'none',cursor:'pointer',fontSize:'15px',fontWeight:600,flex:'1 1 auto',minWidth:'160px',background:mode===k?'linear-gradient(135deg,#667eea,#764ba2)':'transparent',color:mode===k?'white':'#666'}}>

          ))}
        </div>
      </div>

      {/* MAIN CONTENT */}
      <div style={{maxWidth:'1300px',margin:'14px auto',padding:'0 16px 50px'}}>
        {mode==='teacher' && <TeacherView onEditName={(r,cb)=>setEditTarget({row:r,onSave:cb})}/>}
        {mode==='coordinator' && <CoordinatorView onEditName={(r,cb)=>setEditTarget({row:r,onSave:cb})}/>}
        {mode==='learnworld' && <LearnWorldView exportReport={exportAssessmentReport} exportClassSummary={exportClassSummary} adminAccess={isAdmin}/>}
        {mode==='admin' && isAdmin && <AdminDashboard/>}

      {/* MODALS */}
      {showLogin && (
        <AdminLoginModal
          onSuccess={()=>{setIsAdmin(true);setShowLogin(false);setMode('admin');}}
          onClose={()=>setShowLogin(false)}

      )}
      {editTarget && (
        <EditNameModal
          surname={editTarget.row.surname}

              editTarget.onSave(s,f);
              setEditTarget(null);
            }catch(e){alert('Error: '+e.message);}
          }}
        />
      )}
    </div>
  );
}

/* Mount */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

    setLoginBusy(true);

function TeacherClassListTab({selClass, teacherAuth, interventions, setInterventions, showMsg}){
  const [modalFor,setModalFor]=useState(null);
  const learners = selClass ? (CLASS_DATA[selClass] || []) : [];
  const teacherName = `${teacherAuth?.first_name || ''} ${teacherAuth?.surname || ''}`.trim();
  const teacherWhatsapp = teacherAuth?.whatsapp || '';

  const saveIntervention = async(barriers,comments) => {
    if(!modalFor) return;
    try{
      const payload = {
        surname: modalFor.surname,
        firstname: modalFor.firstname,
        class_name: selClass,
        barriers: normalizeBarrierList(barriers),
        comments: comments.trim() || null,
        teacher_name: teacherName || 'Teacher',
        teacher_whatsapp: teacherWhatsapp || null
      };
      const created = await db.post('carissa_interventions', payload);
      const savedRow = Array.isArray(created) ? created[0] : created;
      setInterventions(p=>[savedRow || {...payload,id:`temp-${Date.now()}`}, ...p]);
      setModalFor(null);
      showMsg(`✓ ${payload.firstname} ${payload.surname} added to the intervention list.`);
    }catch(e){
      alert('Error: '+e.message);
    }
  };

  return (
    <div style={card}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px',marginBottom:'10px'}}>
        <div>
          <h3 style={{...ctitle,marginBottom:'2px'}}>Classlist: {selClass}</h3>
          <p style={{fontSize:'13px',color:'#666'}}>
            This classlist is only for the teacher who is logged in. Adding a learner here sends that learner to the intervention list for admin review.
          </p>
        </div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <span style={{background:'#eef2ff',color:'#4f46e5',padding:'7px 12px',borderRadius:'999px',fontSize:'12px',fontWeight:'700'}}>
            {learners.length} learners
          </span>
          <span style={{background:'#fff3e0',color:'#f97316',padding:'7px 12px',borderRadius:'999px',fontSize:'12px',fontWeight:'700'}}>
            {interventions.length} on intervention list
          </span>
        </div>
      </div>

      <div style={{display:'grid',gap:'8px'}}>
        {learners.map((learner,i)=>{
          const onList = interventions.some(iv => learnerKey(iv)===learnerKey({...learner,class_name:selClass}));
          return (
            <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',background:onList?'#fff7ed':'#f8f9fa',borderRadius:'10px',borderLeft:`4px solid ${onList?'#f97316':'#cbd5e1'}`,gap:'10px',flexWrap:'wrap'}}>
              <div style={{fontSize:'14px',color:'#333'}}>
                <strong>{learner.number}.</strong> <strong>{learner.surname}</strong>, {learner.firstname}
                {onList && <span style={{marginLeft:'10px',fontSize:'12px',color:'#f97316',fontWeight:'700'}}>On intervention list</span>}
              </div>
              {!onList ? (
                <button style={{...sbtn,background:'#667eea',fontSize:'12px',padding:'7px 12px'}} onClick={()=>setModalFor(learner)}>
                  + Add to Intervention
                </button>
              ) : (
                <span style={{fontSize:'12px',color:'#888',fontWeight:600}}>Already saved</span>
              )}
            </div>
          );
        })}
      </div>

      {modalFor && <RemedialModal learner={modalFor} onSave={saveIntervention} onClose={()=>setModalFor(null)}/>}
    </div>
  );
}

/* ── Resources Library (read-only, shared by LearnWorld) ──── */
function ResourcesLibrary({resources}){
  const [search,setSearch]=useState('');
  const [filterType,setFT]=useState('all');
  const typeIcon = t => RESOURCE_TYPES.find(x=>x.v===t)?.icon || '📎';
  const filtered = resources.filter(r=>{
    const ms = !search.trim() || (`${r.title} ${r.subject||''} ${r.grade_range||''} ${r.description||''}`).toLowerCase().includes(search.toLowerCase());
    const mt = filterType==='all' || r.type===filterType;
    return ms && mt;
  });
  return (
    <div style={card}>
      <h3 style={ctitle}>📁 Resource Library</h3>
      <p style={{color:'#666',fontSize:'13px',marginBottom:'14px'}}>Resources shared by the admin. Click <strong>Open</strong> to view or download.</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'10px',marginBottom:'14px'}}>
        <div>
          <label style={lbl}>Search</label>
          <input style={inp} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Title, subject, grade..."/>
        </div>
        <div>
          <label style={lbl}>Type</label>
          <select style={inp} value={filterType} onChange={e=>setFT(e.target.value)}>
            <option value="all">All types</option>
            {RESOURCE_TYPES.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
          </select>
        </div>
      </div>
      {filtered.length===0 ? (
        <p style={{color:'#999',textAlign:'center',padding:'30px'}}>
          {resources.length===0 ? 'No resources have been uploaded yet.' : 'No resources match your filter.'}
        </p>
      ) : (
        <div style={{display:'grid',gap:'10px'}}>
          {filtered.map(r=>(
            <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'14px',background:'#f8f9fa',borderRadius:'10px',borderLeft:'5px solid #667eea',gap:'12px',flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:'200px'}}>
                <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
                  <span style={{fontSize:'20px'}}>{typeIcon(r.type)}</span>
                  <span style={{fontWeight:700,color:'#333',fontSize:'15px'}}>{r.title}</span>
                </div>
                <div style={{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'4px'}}>
                  {r.subject && <span style={{background:'#667eea22',color:'#667eea',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{r.subject}</span>}
                  {r.grade_range && <span style={{background:'#28a74522',color:'#28a745',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{r.grade_range}</span>}
                </div>
                {r.description && <p style={{fontSize:'13px',color:'#666',marginTop:'4px'}}>{r.description}</p>}
              </div>
              <a href={r.url} target="_blank" rel="noreferrer" style={{...sbtn,background:'#28a745',textDecoration:'none',display:'inline-block',flexShrink:0}}>🔗 Open / Download</a>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   ADMIN DASHBOARD: AUDIT & RECOVERY TAB (NEW)
   View change history and restore deleted records
   ════════════════════════════════════════════════════════════════ */
const AUDIT_TABLES = [
  {v:'all', l:'All tables'},
  {v:'carissa_interventions', l:'Interventions', friendly:'Interventions'},
  {v:'carissa_elearning_assessments', l:'eLearning Assessments', friendly:'Assessments'},
  {v:'carissa_resources', l:'Resources', friendly:'Resources'},
  {v:'carissa_resource_assignments', l:'Resource Assignments', friendly:'Assignments'},
  {v:'carissa_teachers', l:'Teachers', friendly:'Teachers'},
];
const friendlyTable = t => AUDIT_TABLES.find(x=>x.v===t)?.friendly || t;

function AuditAdminTab(){
  const [logs,setLogs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterTable,setFT]=useState('all');
  const [filterOp,setFO]=useState('all');
  const [search,setSearch]=useState('');
  const [msg,setMsg]=useState('');
  const showMsg = m => {setMsg(m);setTimeout(()=>setMsg(''),5000);};

  const load = async () => {
    setLoading(true);
    try{
      // Last 500 entries should be plenty
      const d = await db.get('carissa_audit_log','order=changed_at.desc&limit=500');
      setLogs(d);
    }catch(e){console.error(e);}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  /* Restore: re-insert a deleted record from its old_data snapshot */
  const restore = async (entry) => {
    if(entry.operation !== 'DELETE'){alert('Only deleted records can be restored.');return;}
    const data = entry.old_data;
    if(!data){alert('No data to restore.');return;}
    if(!confirm(`Restore this ${friendlyTable(entry.table_name)} record?`)) return;

    /* Strip timestamp fields that should regenerate; keep id so restored row points back to the same one */
    const payload = {...data};
    delete payload.created_at;
    delete payload.updated_at;

    try{
      await db.post(entry.table_name, payload, 'return=minimal');
      showMsg(`✓ Restored to ${friendlyTable(entry.table_name)}.`);
      await load(); // refresh to show the new INSERT audit entry
    }catch(e){
      /* If the id already exists (row was restored before, or never deleted physically), try without id */
      if(String(e.message).includes('duplicate')){
        const noId = {...payload}; delete noId.id;
        try{
          await db.post(entry.table_name, noId, 'return=minimal');
          showMsg(`✓ Restored (new id).`);
          await load();
        }catch(e2){alert('Restore failed: '+e2.message);}
      } else {
        alert('Restore failed: '+e.message);
      }
    }
  };

  /* Filtering */
  const filtered = logs.filter(l=>{
    const mt = filterTable==='all' || l.table_name===filterTable;
    const mo = filterOp==='all' || l.operation===filterOp;
    if(!search.trim()) return mt && mo;
    const blob = JSON.stringify(l.old_data || l.new_data || {}).toLowerCase();
    return mt && mo && blob.includes(search.toLowerCase());
  });

  /* Friendly description of an entry */
  const describe = (l) => {
    const d = l.old_data || l.new_data || {};
    if(d.surname && d.firstname) return `${d.surname}, ${d.firstname}${d.class_name?` (${d.class_name})`:''}`;
    if(d.title) return d.title;
    if(d.teacher_name) return `${d.teacher_name} (${d.class_name||''})`;
    return l.row_id || '—';
  };

  const opColor = op => op==='INSERT' ? '#28a745' : op==='UPDATE' ? '#f97316' : '#dc3545';
  const opIcon  = op => op==='INSERT' ? '➕' : op==='UPDATE' ? '✏️' : '🗑';

  /* Count of restorable (deleted) records */
  const deletedCount = logs.filter(l=>l.operation==='DELETE').length;
  const insertCount  = logs.filter(l=>l.operation==='INSERT').length;
  const updateCount  = logs.filter(l=>l.operation==='UPDATE').length;

  if(loading) return <div style={{textAlign:'center',padding:'80px',color:'#667eea'}}>Loading change history...</div>;

  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}

      <div style={card}>
        <h3 style={ctitle}>🛡 Audit & Recovery</h3>
        <p style={{color:'#666',fontSize:'13px',marginBottom:'14px'}}>
          Every change to every table is recorded here. If something is deleted by mistake, you can restore it with one click.
          This protection started from {new Date().toLocaleDateString('en-ZA',{day:'numeric',month:'long',year:'numeric'})}.
        </p>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:'10px',marginBottom:'14px'}}>
          <div style={{background:'#e8f5e9',padding:'12px',borderRadius:'8px',textAlign:'center'}}>
            <div style={{fontSize:'22px',fontWeight:700,color:'#28a745'}}>{insertCount}</div>
            <div style={{fontSize:'12px',color:'#666'}}>Records added</div>
          </div>
          <div style={{background:'#fff3e0',padding:'12px',borderRadius:'8px',textAlign:'center'}}>
            <div style={{fontSize:'22px',fontWeight:700,color:'#f97316'}}>{updateCount}</div>
            <div style={{fontSize:'12px',color:'#666'}}>Records updated</div>
          </div>
          <div style={{background:'#ffebee',padding:'12px',borderRadius:'8px',textAlign:'center'}}>
            <div style={{fontSize:'22px',fontWeight:700,color:'#dc3545'}}>{deletedCount}</div>
            <div style={{fontSize:'12px',color:'#666'}}>Deletions (restorable)</div>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'10px'}}>
          <div>
            <label style={lbl}>Table</label>
            <select style={inp} value={filterTable} onChange={e=>setFT(e.target.value)}>
              {AUDIT_TABLES.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Action</label>
            <select style={inp} value={filterOp} onChange={e=>setFO(e.target.value)}>
              <option value="all">All actions</option>
              <option value="INSERT">➕ Inserts</option>
              <option value="UPDATE">✏️ Updates</option>
              <option value="DELETE">🗑 Deletions</option>
            </select>
          </div>
          <div>
            <label style={lbl}>Search</label>
            <input style={inp} placeholder="Name, title..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div style={{display:'flex',alignItems:'flex-end'}}>
            <button style={{...sbtn,background:'#667eea',width:'100%'}} onClick={load}>🔄 Refresh</button>
          </div>
        </div>
      </div>

      {filtered.length===0 ? (
        <div style={card}>
          <p style={{color:'#999',textAlign:'center',padding:'30px'}}>
            {logs.length===0 ? 'No changes recorded yet. Once you start using the app, every change will appear here.' : 'No entries match your filters.'}
          </p>
        </div>
      ) : (
        <div style={card}>
          <div style={{display:'grid',gap:'8px'}}>
            {filtered.map(l=>(
              <div key={l.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'12px 14px',background:'#f8f9fa',borderRadius:'8px',borderLeft:`4px solid ${opColor(l.operation)}`,gap:'10px',flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:'200px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px',flexWrap:'wrap'}}>
                    <span style={{fontSize:'18px'}}>{opIcon(l.operation)}</span>
                    <span style={{background:opColor(l.operation)+'22',color:opColor(l.operation),padding:'2px 8px',borderRadius:'10px',fontSize:'11px',fontWeight:700}}>{l.operation}</span>
                    <span style={{background:'#667eea22',color:'#667eea',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{friendlyTable(l.table_name)}</span>
                    <span style={{fontSize:'11px',color:'#888'}}>{new Date(l.changed_at).toLocaleString('en-ZA')}</span>
                  </div>
                  <div style={{fontWeight:600,color:'#333',fontSize:'14px'}}>{describe(l)}</div>
                  {l.operation==='DELETE' && l.old_data?.barriers && (
                    <div style={{marginTop:'4px'}}>
                      {(l.old_data.barriers||[]).map((b,i)=>(
                        <span key={i} style={{background:'#fff',border:'1px solid #ddd',padding:'1px 6px',borderRadius:'8px',fontSize:'10px',marginRight:'3px',color:'#666'}}>{b}</span>
                      ))}
                    </div>
                  )}
                </div>
                {l.operation==='DELETE' && (
                  <button style={{...sbtn,background:'#28a745',fontSize:'12px',padding:'6px 12px',flexShrink:0}} onClick={()=>restore(l)}>
                    ↩️ Restore
                  </button>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

</script>
