// Determine phase from class name: Gr 1-3 = foundation, Gr 4-7 = intermediate
function phaseForClass(cn){
  const m = cn.match(/Grade (\d)/);
  if(!m) return 'intermediate';
  const g = parseInt(m[1],10);
  return g <= 3 ? 'foundation' : 'intermediate';
}

function BarChart({data, colorFn}){
  const max = Math.max(1, ...data.map(d=>d.value));
  return (
    <div style={{display:'flex',flexDirection:'column',gap:'10px'}}>
      {data.map((d,i)=>(
        <div key={i} style={{display:'flex',alignItems:'center',gap:'10px'}}>
          <div style={{minWidth:'130px',fontSize:'13px',color:'#333'}}>{d.label}</div>
          <div style={{flex:1,background:'#f0f0f5',borderRadius:'6px',height:'22px',position:'relative'}}>
            <div style={{width:`${(d.value/max)*100}%`,height:'100%',background:colorFn?colorFn(i):'#667eea',borderRadius:'6px',transition:'width 0.4s'}}/>
          </div>
          <div style={{minWidth:'30px',textAlign:'right',fontSize:'13px',color:'#333',fontWeight:600}}>{d.value}</div>
        </div>
      ))}
    </div>
  );
}

function StatusBadge({status}){

}

/* ── Admin Login Modal ──────────────────────────────────────── */
function AdminLoginModal({onSuccess,onClose}){
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const FALLBACK_PIN = "Carissa@2025";
  const verify = async () => {
    if(!pin.trim()){setErr('Please enter the admin PIN.');return;}
    setBusy(true);setErr('');
    if(pin.trim()===FALLBACK_PIN){onSuccess();setBusy(false);return;}
    try{
      const d = await db.get('carissa_config','key=eq.admin_pin');
      if(d.length>0 && d[0].value===pin.trim()) onSuccess();
      else setErr('Incorrect PIN. Please try again.');
    }catch{setErr('Could not verify. Check connection.');}
    setBusy(false);
  };
  return (
    <div style={ovly} onClick={onClose}>
      <div style={mdl} onClick={e=>e.stopPropagation()}>
        <h2 style={{marginBottom:'15px',color:'#667eea'}}>🔐 Admin Login</h2>
        <p style={{marginBottom:'15px',color:'#666',fontSize:'14px'}}>Enter your admin PIN to access admin mode.</p>
        <div style={{marginBottom:'15px'}}>
          <label style={lbl}>Admin PIN</label>
          <input style={inp} type="password" placeholder="Enter PIN..." value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')verify();}} autoFocus/>
          {err && <p style={{color:'#dc3545',fontSize:'13px',marginTop:'6px'}}>{err}</p>}
        </div>
        <div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
          <button style={btn} onClick={verify} disabled={busy}>{busy?'Verifying...':'🔓 Login as Admin'}</button>
          <button style={{...btn,background:'#6c757d'}} onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

        </div>
      </div>
    </div>
  );

  const completed = assignments.filter(a=>a.status==='completed').length;

          ['⏳','Pending Assignments',pending,'#dc3545'],
          ['📝','Assessments Done',assessedCount,'#10b981'],
        ].map(([icon,label,val,color])=>(
          <div key={label} style={{background:'white',padding:'18px',borderRadius:'12px',boxShadow:'0 6px 18px rgba(0,0,0,0.08)',borderLeft:`5px solid ${color}`}}>
            <div style={{fontSize:'24px'}}>{icon}</div>
            <div style={{fontSize:'24px',fontWeight:700,color,marginTop:'6px'}}>{val}</div>

      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(360px,1fr))',gap:'20px'}}>
        <div style={card}>
          <h3 style={ctitle}>Barriers Breakdown</h3>
          {barrierData.every(d=>d.value===0)
            ? <p style={{color:'#999',textAlign:'center',padding:'20px'}}>No data yet</p>
            : <BarChart data={barrierData} colorFn={i=>COLORS[i%COLORS.length]}/>}
        </div>
        <div style={card}>
          <h3 style={ctitle}>Top Classes (Interventions)</h3>
          {classData.length===0
            ? <p style={{color:'#999',textAlign:'center',padding:'20px'}}>No data yet</p>
            : <BarChart data={classData}/>}
        </div>
      </div>

      <div style={card}>
        <h3 style={ctitle}>Recent Entries</h3>
        {recent.length===0
          ? <p style={{color:'#999',textAlign:'center',padding:'20px'}}>No entries yet</p>
          : (
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
                <thead>
                  <tr style={{borderBottom:'2px solid #eee'}}>
                    {['Learner','Class','Barriers','Teacher','Date'].map(h=>(
                      <th key={h} style={{textAlign:'left',padding:'10px',color:'#666',fontWeight:600}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {recent.map((r,i)=>(
                    <tr key={i} style={{borderBottom:'1px solid #f0f0f0'}}>
                      <td style={{padding:'10px'}}>{r.surname}, {r.firstname}</td>
                      <td style={{padding:'10px'}}>{r.class_name}</td>
                      <td style={{padding:'10px'}}>
                        {(r.barriers||[]).slice(0,2).map((b,j)=>(
                          <span key={j} style={{background:'#667eea22',color:'#667eea',padding:'2px 8px',borderRadius:'10px',fontSize:'11px',marginRight:'4px'}}>{b.split(' ')[0]}</span>
                        ))}
                        {r.barriers?.length>2 && <span style={{fontSize:'11px',color:'#888'}}>+{r.barriers.length-2}</span>}
                      </td>
                      <td style={{padding:'10px'}}>{r.teacher_name}</td>
                      <td style={{padding:'10px'}}>{r.date_added?new Date(r.date_added).toLocaleDateString('en-ZA'):''}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   ADMIN DASHBOARD: RESOURCES TAB
   ════════════════════════════════════════════════════════════════ */
function ResourcesTab({resources,setResources}){
  const blank = {title:'',type:'link',url:'',subject:'',grade_range:'',description:''};
  const [form,setForm]=useState({...blank});
  const [file,setFile]=useState(null);
  const [uploading,setUpl]=useState(false);
  const [msg,setMsg]=useState('');
  const fileRef = useRef();
  const showMsg = m => {setMsg(m);setTimeout(()=>setMsg(''),5000);};
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const handleSubmit = async () => {
    if(!form.title.trim()){alert('Title is required');return;}
    setUpl(true);
    try{
      let url = form.url.trim();
      if(file && form.type!=='link'){
        const path = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
        url = await db.upload(path,file);
      }
      if(!url){alert('Please enter a URL or upload a file');setUpl(false);return;}
      const rows = await db.post('carissa_resources',{...form,title:form.title.trim(),url,uploaded_by:'Admin'});
      setResources(p=>[rows[0],...p]);
      setForm({...blank});setFile(null);
      if(fileRef.current) fileRef.current.value='';
      showMsg('✓ Resource added successfully!');
    }catch(e){alert('Error: '+e.message);}
    setUpl(false);
  };

  const handleDelete = async (id) => {
    if(!confirm('Delete this resource?')) return;
    try{
      await db.del('carissa_resources',`id=eq.${id}`);
      setResources(p=>p.filter(r=>r.id!==id));
      showMsg('✓ Resource deleted.');
    }catch(e){alert('Error: '+e.message);}
  };

  const typeIcon = t => RESOURCE_TYPES.find(x=>x.v===t)?.icon || '📎';

  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}
      <div style={card}>
        <h3 style={ctitle}>Add New Resource / Activity</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'12px',marginBottom:'12px'}}>
          <div>
            <label style={lbl}>Title *</label>
            <input style={inp} value={form.title} onChange={e=>f('title',e.target.value)} placeholder="e.g. Reading Comprehension Worksheet"/>
          </div>
          <div>
            <label style={lbl}>Type</label>
            <select style={inp} value={form.type} onChange={e=>f('type',e.target.value)}>
              {RESOURCE_TYPES.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Subject</label>
            <input style={inp} value={form.subject} onChange={e=>f('subject',e.target.value)} placeholder="e.g. English HL"/>
          </div>
          <div>
            <label style={lbl}>Grade Range</label>
            <input style={inp} value={form.grade_range} onChange={e=>f('grade_range',e.target.value)} placeholder="e.g. Grade 2-3 or All"/>
          </div>
        </div>
        <div style={{marginBottom:'12px'}}>
          {form.type==='link' ? (
            <div>
              <label style={lbl}>URL / Link</label>
              <input style={inp} value={form.url} onChange={e=>f('url',e.target.value)} placeholder="https://..."/>
            </div>
          ) : (
            <div>
              <label style={lbl}>Upload File (PDF or Word)</label>
              <input ref={fileRef} type="file" accept=".pdf,.doc,.docx,.mp4,.mov" style={{...inp,padding:'8px',cursor:'pointer'}} onChange={e=>setFile(e.target.files[0]||null)}/>
              <p style={{fontSize:'12px',color:'#888',marginTop:'4px'}}>Or paste a direct URL below:</p>
              <input style={{...inp,marginTop:'6px'}} value={form.url} onChange={e=>f('url',e.target.value)} placeholder="https://... (optional if uploading file)"/>
            </div>
          )}
        </div>
        <div style={{marginBottom:'12px'}}>
          <label style={lbl}>Description (optional)</label>
          <textarea style={{...inp,resize:'vertical'}} rows={3} value={form.description} onChange={e=>f('description',e.target.value)} placeholder="Brief description of the activity..."/>
        </div>
        <button style={btn} onClick={handleSubmit} disabled={uploading}>{uploading?'Uploading...':'📤 Add Resource'}</button>
      </div>

      <div style={card}>
        <h3 style={ctitle}>Resource Library ({resources.length})</h3>
        {resources.length===0
          ? <p style={{color:'#999',textAlign:'center',padding:'30px'}}>No resources added yet. Add one above.</p>
          : (
            <div style={{display:'grid',gap:'12px'}}>
              {resources.map(r=>(
                <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'16px',background:'#f8f9fa',borderRadius:'10px',borderLeft:'5px solid #667eea',gap:'12px',flexWrap:'wrap'}}>
                  <div style={{flex:1,minWidth:'200px'}}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}}>
                      <span style={{fontSize:'20px'}}>{typeIcon(r.type)}</span>
                      <span style={{fontWeight:700,color:'#333',fontSize:'15px'}}>{r.title}</span>
                    </div>
                    <div style={{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'4px'}}>
                      {r.subject && <span style={{background:'#667eea22',color:'#667eea',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{r.subject}</span>}
                      {r.grade_range && <span style={{background:'#28a74522',color:'#28a745',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{r.grade_range}</span>}
                    </div>
                    {r.description && <p style={{fontSize:'13px',color:'#666',marginTop:'4px'}}>{r.description}</p>}
                  </div>
                  <div style={{display:'flex',gap:'8px',flexShrink:0}}>
                    <a href={r.url} target="_blank" rel="noreferrer" style={{...sbtn,background:'#28a745',textDecoration:'none',display:'inline-block'}}>🔗 Open</a>
                    <button style={{...sbtn,background:'#dc3545'}} onClick={()=>handleDelete(r.id)}>🗑 Delete</button>
                  </div>
                </div>
              ))}
            </div>
          )}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   ADMIN DASHBOARD: ASSIGNMENTS TAB
   ════════════════════════════════════════════════════════════════ */
function AssignmentsTab({interventions,resources,assignments,setAssignments}){
  const blank = {resource_id:'',class_name:'',assign_type:'class',surname:'',firstname:'',due_date:'',notes:''};
  const [form,setForm]=useState({...blank});
  const [msg,setMsg]=useState('');
  const [busy,setBusy]=useState(false);
  const showMsg = m => {setMsg(m);setTimeout(()=>setMsg(''),5000);};
  const f = (k,v) => setForm(p=>({...p,[k]:v}));

  const classLearners = form.class_name
    ? interventions.filter(i=>i.class_name===form.class_name)
    : [];

  const handleAssign = async () => {
    if(!form.resource_id||!form.class_name){alert('Please select a resource and a class');return;}
    setBusy(true);
    try{
      const base = {
        resource_id:form.resource_id, class_name:form.class_name,
        assign_type:form.assign_type, assigned_by:'Admin',
        due_date:form.due_date||null, notes:form.notes.trim()||null
      };
      if(form.assign_type==='class'){
        const targets = interventions.filter(i=>i.class_name===form.class_name);
        if(!targets.length){alert('No learners on intervention list in this class');setBusy(false);return;}
        const rows = [];
        for(const t of targets){
          const r = await db.post('carissa_resource_assignments',{...base,surname:t.surname,firstname:t.firstname});
          rows.push(r[0]);
        }
        setAssignments(p=>[...rows,...p]);
        showMsg(`✓ Assigned to ${rows.length} learners in ${form.class_name}`);
      } else {
        if(!form.surname||!form.firstname){alert('Select a learner');setBusy(false);return;}
        const r = await db.post('carissa_resource_assignments',{...base,surname:form.surname,firstname:form.firstname});
        setAssignments(p=>[r[0],...p]);
        showMsg(`✓ Assigned to ${form.firstname} ${form.surname}`);
      }
      setForm({...blank});
    }catch(e){alert('Error: '+e.message);}
    setBusy(false);
  };

  const handleStatusChange = async (id,status) => {
    try{
      await db.patch('carissa_resource_assignments',`id=eq.${id}`,{status,updated_at:new Date().toISOString()});
      setAssignments(p=>p.map(a=>a.id===id?{...a,status}:a));
    }catch(e){alert('Error: '+e.message);}
  };

  const grouped = {};
  assignments.forEach(a=>{
    const key = a.class_name||'Unknown';
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(a);
  });

  const resTitle = id => resources.find(r=>r.id===id)?.title || 'Unknown resource';

  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}
      <div style={card}>
        <h3 style={ctitle}>Assign Activity to Learners</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'12px',marginBottom:'12px'}}>
          <div>
            <label style={lbl}>Resource / Activity *</label>
            <select style={inp} value={form.resource_id} onChange={e=>f('resource_id',e.target.value)}>
              <option value="">-- Select Resource --</option>
              {resources.map(r=><option key={r.id} value={r.id}>{RESOURCE_TYPES.find(t=>t.v===r.type)?.icon} {r.title}{r.subject?` (${r.subject})`:''}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Class *</label>
            <select style={inp} value={form.class_name} onChange={e=>f('class_name',e.target.value)}>
              <option value="">-- Select Class --</option>
              {CLASS_NAMES.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Assign To</label>
            <select style={inp} value={form.assign_type} onChange={e=>f('assign_type',e.target.value)}>
              <option value="class">All intervention learners in this class</option>
              <option value="learner">Specific learner</option>
            </select>
          </div>
          {form.assign_type==='learner' && (
            <div>
              <label style={lbl}>Learner</label>
              <select style={inp} value={`${form.surname}|${form.firstname}`} onChange={e=>{const [s,fn]=e.target.value.split('|');f('surname',s);f('firstname',fn);}}>
                <option value="|">-- Select Learner --</option>
                {classLearners.map((l,i)=><option key={i} value={`${l.surname}|${l.firstname}`}>{l.surname}, {l.firstname}</option>)}
              </select>
            </div>
          )}
          <div>
            <label style={lbl}>Due Date (optional)</label>
            <input style={inp} type="date" value={form.due_date} onChange={e=>f('due_date',e.target.value)}/>
          </div>
        </div>
        <div style={{marginBottom:'12px'}}>
          <label style={lbl}>Notes (optional)</label>
          <textarea style={{...inp,resize:'vertical'}} rows={2} value={form.notes} onChange={e=>f('notes',e.target.value)} placeholder="Any instructions or context..."/>
        </div>
        <button style={btn} onClick={handleAssign} disabled={busy||!resources.length}>
          {busy?'Assigning...':(resources.length?'📋 Assign Activity':'Add resources first')}
        </button>
      </div>

      <div style={card}>
        <h3 style={ctitle}>Current Assignments ({assignments.length})</h3>
        {assignments.length===0
          ? <p style={{color:'#999',textAlign:'center',padding:'30px'}}>No assignments yet.</p>
          : Object.entries(grouped).map(([cls,items])=>(
              <div key={cls} style={{marginBottom:'24px'}}>
                <h4 style={{color:'#667eea',marginBottom:'10px',fontSize:'15px',fontWeight:700}}>📚 {cls} ({items.length})</h4>
                {items.map(a=>(
                  <div key={a.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px',background:'#f8f9fa',borderRadius:'8px',marginBottom:'8px',gap:'10px',flexWrap:'wrap'}}>
                    <div style={{flex:1,minWidth:'200px'}}>
                      <div style={{fontWeight:600,color:'#333',fontSize:'14px',marginBottom:'2px'}}>{a.surname}, {a.firstname}</div>
                      <div style={{fontSize:'13px',color:'#667eea'}}>{resTitle(a.resource_id)}</div>
                      {a.due_date && <div style={{fontSize:'12px',color:'#888',marginTop:'2px'}}>Due: {new Date(a.due_date).toLocaleDateString('en-ZA')}</div>}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:'8px',flexShrink:0}}>
                      <StatusBadge status={a.status}/>
                      <select value={a.status} onChange={e=>handleStatusChange(a.id,e.target.value)} style={{padding:'5px 8px',border:'1px solid #ddd',borderRadius:'8px',fontSize:'12px',cursor:'pointer',background:'white'}}>
                        {STATUS_OPTS.map(s=><option key={s.v} value={s.v}>{s.l}</option>)}
                      </select>
                    </div>
                  </div>
                ))}
              </div>
            ))}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   ADMIN DASHBOARD: PROGRESS TAB
   ════════════════════════════════════════════════════════════════ */
function ProgressTab({assignments,setAssignments,resources}){
  const [filterClass,setFC]=useState('');
  const [filterStatus,setFS]=useState('all');
  const [notes,setNotes]=useState({});
  const [msg,setMsg]=useState('');
  const showMsg = m => {setMsg(m);setTimeout(()=>setMsg(''),5000);};

  const filtered = assignments.filter(a=>{
    const mc = !filterClass||a.class_name===filterClass;
    const ms = filterStatus==='all'||a.status===filterStatus;
    return mc&&ms;
  });

  const resTitle = id => resources.find(r=>r.id===id)?.title || 'Unknown';
  const resType = id => resources.find(r=>r.id===id)?.type || 'link';
  const resUrl = id => resources.find(r=>r.id===id)?.url || '#';

  const saveProgress = async (id,status,note) => {
    try{
      await db.patch('carissa_resource_assignments',`id=eq.${id}`,{status,progress_notes:note||null,updated_at:new Date().toISOString()});
      setAssignments(p=>p.map(a=>a.id===id?{...a,status,progress_notes:note}:a));
      showMsg('✓ Progress updated!');
    }catch(e){alert('Error: '+e.message);}
  };

  const completedCount = assignments.filter(a=>a.status==='completed').length;
  const total = assignments.length;

  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}
      {total>0 && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'15px',marginBottom:'20px'}}>
          <div style={{background:'white',padding:'18px',borderRadius:'12px',boxShadow:'0 6px 18px rgba(0,0,0,0.08)'}}>
            <div style={{fontSize:'13px',color:'#666'}}>Overall Completion</div>
            <div style={{fontSize:'30px',fontWeight:700,color:'#10b981'}}>{total?Math.round((completedCount/total)*100):0}%</div>
            <div style={{fontSize:'12px',color:'#888'}}>{completedCount} of {total} assignments completed</div>
          </div>
          <div style={{background:'white',padding:'18px',borderRadius:'12px',boxShadow:'0 6px 18px rgba(0,0,0,0.08)'}}>
            <div style={{fontSize:'13px',color:'#666'}}>Active Learners</div>
            <div style={{fontSize:'30px',fontWeight:700,color:'#667eea'}}>{new Set(assignments.map(a=>`${a.class_name}_${a.surname}_${a.firstname}`)).size}</div>
          </div>
        </div>
      )}

      <div style={{...card,padding:'16px',marginBottom:'14px'}}>
        <div style={{display:'flex',gap:'12px',flexWrap:'wrap',alignItems:'center'}}>
          <select style={{...inp,width:'auto',flex:'1',minWidth:'150px'}} value={filterClass} onChange={e=>setFC(e.target.value)}>
            <option value="">All Classes</option>
            {CLASS_NAMES.map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
            {[{v:'all',l:'All'},{v:'assigned',l:'Assigned'},{v:'in_progress',l:'In Progress'},{v:'completed',l:'Completed'}].map(s=>(
              <button key={s.v} onClick={()=>setFS(s.v)} style={{padding:'8px 14px',borderRadius:'20px',border:'2px solid #667eea',cursor:'pointer',fontWeight:600,fontSize:'13px',background:filterStatus===s.v?'#667eea':'white',color:filterStatus===s.v?'white':'#667eea'}}>
                {s.l}
              </button>
            ))}
          </div>
        </div>
      </div>

      {filtered.length===0 ? (
        <div style={card}><p style={{color:'#999',textAlign:'center',padding:'30px'}}>{assignments.length===0?'No assignments yet — go to the Assignments tab to add some.':'No assignments match your filter.'}</p></div>
      ) : filtered.map(a=>{
        const noteVal = notes[a.id]!==undefined ? notes[a.id] : (a.progress_notes||'');
        return (
          <div key={a.id} style={{...card,marginBottom:'12px',padding:'20px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'10px',marginBottom:'12px'}}>
              <div>
                <div style={{fontWeight:700,color:'#333',fontSize:'16px'}}>{a.surname}, {a.firstname}</div>
                <span style={{background:'#667eea22',color:'#667eea',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{a.class_name}</span>
              </div>
              <StatusBadge status={a.status}/>
            </div>
            <div style={{background:'#f8f9fa',borderRadius:'8px',padding:'10px',marginBottom:'10px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',flexWrap:'wrap'}}>
              <div>
                <span style={{fontSize:'16px',marginRight:'6px'}}>{RESOURCE_TYPES.find(t=>t.v===resType(a.resource_id))?.icon}</span>
                <span style={{fontSize:'14px',color:'#333',fontWeight:600}}>{resTitle(a.resource_id)}</span>
              </div>
              <a href={resUrl(a.resource_id)} target="_blank" rel="noreferrer" style={{...sbtn,background:'#667eea',textDecoration:'none',fontSize:'13px'}}>Open Activity</a>
            </div>
            {a.due_date && <div style={{fontSize:'13px',color:'#888',marginBottom:'10px'}}>📅 Due: {new Date(a.due_date).toLocaleDateString('en-ZA')}</div>}
            <div style={{display:'flex',gap:'8px',alignItems:'flex-start',flexWrap:'wrap'}}>
              <textarea style={{...inp,flex:1,resize:'vertical',fontSize:'13px',minWidth:'200px'}} rows={2}
                placeholder="Progress notes..." value={noteVal}
                onChange={e=>setNotes(p=>({...p,[a.id]:e.target.value}))}/>
              <div style={{display:'flex',flexDirection:'column',gap:'6px',flexShrink:0}}>
                {STATUS_OPTS.filter(s=>s.v!==a.status).map(s=>(
                  <button key={s.v} style={{...sbtn,background:s.c,fontSize:'12px',padding:'8px 12px',whiteSpace:'nowrap'}}
                    onClick={()=>saveProgress(a.id,s.v,noteVal)}>
                    Mark {s.l}
                  </button>
                ))}
                <button style={{...sbtn,background:'#6c757d',fontSize:'12px',padding:'8px 12px'}}
                  onClick={()=>saveProgress(a.id,a.status,noteVal)}>
                  💾 Save Notes
                </button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   ADMIN DASHBOARD: INTERVENTIONS MANAGEMENT TAB (NEW)
   Full superuser CRUD: add, edit (incl. barriers), delete
   ════════════════════════════════════════════════════════════════ */
function InterventionsAdminTab({interventions, setInterventions}){
  const [filterClass,setFC]=useState('');
  const [filterBarrier,setFB]=useState('all');
  const [search,setSearch]=useState('');
  const [editing,setEditing]=useState(null); // null | row object | 'new'
  const [msg,setMsg]=useState('');
  const showMsg = m => {setMsg(m);setTimeout(()=>setMsg(''),5000);};

  const filtered = interventions.filter(r=>{
    const mc = !filterClass || r.class_name===filterClass;
    const mb = filterBarrier==='all' || (r.barriers||[]).includes(filterBarrier);
    const ms = !search.trim() || (`${r.surname} ${r.firstname}`).toLowerCase().includes(search.toLowerCase());
    return mc && mb && ms;
  });

  const handleDelete = async (r) => {
    if(!confirm(`Remove ${r.firstname} ${r.surname} from the intervention list? This deletes the entry permanently.`)) return;
    try{
      await db.del('carissa_interventions',`id=eq.${r.id}`);
      setInterventions(p=>p.filter(x=>x.id!==r.id));
      showMsg(`✓ ${r.firstname} ${r.surname} removed.`);
    }catch(e){alert('Error: '+e.message);}
  };

  /* Group by class for cleaner display */
  const grouped = {};
  filtered.forEach(r=>{
    const key = r.class_name || 'Unknown';
    if(!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  });

  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}

      <div style={card}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:'10px',marginBottom:'10px'}}>
          <h3 style={{...ctitle,marginBottom:0}}>🎯 Manage Interventions ({interventions.length})</h3>
          <button style={btn} onClick={()=>setEditing('new')}>+ Add New Intervention</button>
        </div>
        <p style={{color:'#666',fontSize:'13px',marginBottom:'14px'}}>
          Full admin control — add new learners, edit any field (name, class, barriers, teacher details, comments), or remove entries entirely.
        </p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:'10px'}}>
          <div>
            <label style={lbl}>Class</label>
            <select style={inp} value={filterClass} onChange={e=>setFC(e.target.value)}>
              <option value="">All Classes</option>
              {CLASS_NAMES.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Barrier</label>
            <select style={inp} value={filterBarrier} onChange={e=>setFB(e.target.value)}>
              {BARRIER_FILTERS.map(f=><option key={f.value} value={f.value}>{f.label}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Search</label>
            <input style={inp} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Type a name..."/>
          </div>
        </div>
      </div>

      {filtered.length===0 ? (
        <div style={card}>
          <p style={{color:'#999',textAlign:'center',padding:'30px'}}>
            {interventions.length===0 ? 'No intervention entries yet — click "+ Add New Intervention" above to start.' : 'No entries match your filters.'}
          </p>
        </div>
      ) : (
        Object.entries(grouped).map(([cls,items])=>(
          <div key={cls} style={card}>
            <h4 style={{color:'#667eea',marginBottom:'10px',fontSize:'15px',fontWeight:700}}>
              📚 {cls} <span style={{color:'#888',fontWeight:400,fontSize:'13px'}}>({items.length})</span>
            </h4>
            <div style={{display:'grid',gap:'8px'}}>
              {items.map(r=>(
                <div key={r.id} style={{background:'#f8f9fa',padding:'12px 14px',borderRadius:'10px',borderLeft:'5px solid #667eea'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'10px',marginBottom:'6px'}}>
                    <div style={{flex:1,minWidth:'200px'}}>
                      <div style={{fontWeight:700,color:'#333',fontSize:'15px',marginBottom:'4px'}}>
                        {r.surname}, {r.firstname}
                      </div>
                      {(r.barriers||[]).length>0 && (
                        <div style={{marginBottom:'4px'}}>
                          {(r.barriers||[]).map((b,i)=>(
                            <span key={i} style={{background:'#f97316',color:'white',padding:'3px 9px',borderRadius:'12px',fontSize:'11px',marginRight:'4px',display:'inline-block',marginBottom:'3px'}}>
                              {b}
                            </span>
                          ))}
                        </div>
                      )}
                      {r.comments && (
                        <p style={{fontSize:'13px',color:'#555',marginTop:'4px',fontStyle:'italic'}}>"{r.comments}"</p>
                      )}
                      <p style={{fontSize:'11px',color:'#888',marginTop:'6px'}}>
                        👩‍🏫 {r.teacher_name || '—'} · 📱 {r.teacher_whatsapp || '—'}
                        {r.date_added && <span> · Added {new Date(r.date_added).toLocaleDateString('en-ZA')}</span>}
                      </p>
                    </div>
                    <div style={{display:'flex',gap:'6px',flexShrink:0,flexWrap:'wrap'}}>
                      <button style={{...sbtn,background:'#667eea',fontSize:'12px',padding:'6px 12px'}} onClick={()=>setEditing(r)}>✏️ Edit</button>
                      <button style={{...sbtn,background:'#dc3545',fontSize:'12px',padding:'6px 12px'}} onClick={()=>handleDelete(r)}>🗑 Delete</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))
      )}

      {editing && (
        <InterventionEditModal
          row={editing==='new' ? null : editing}
          onClose={()=>setEditing(null)}
          onSaved={(saved,isUpdate)=>{
            setInterventions(p => isUpdate ? p.map(x=>x.id===saved.id?saved:x) : [saved,...p]);
            showMsg(isUpdate ? '✓ Intervention updated.' : '✓ New intervention added.');
            setEditing(null);
          }}
        />
      )}
    </div>
  );
}

/* ── Intervention Add / Edit modal (full CRUD form) ─────────── */
function InterventionEditModal({row,onClose,onSaved}){
  const isNew = !row;
  const [surname,setSurname]=useState(row?.surname || '');
  const [firstname,setFirstname]=useState(row?.firstname || '');
  const [className,setClassName]=useState(row?.class_name || '');
  const [barriers,setBarriers]=useState(row?.barriers || []);
  const [comments,setComments]=useState(row?.comments || '');
  const [teacherName,setTeacherName]=useState(row?.teacher_name || '');
  const [teacherWhatsapp,setTeacherWhatsapp]=useState(row?.teacher_whatsapp || '');
  const [busy,setBusy]=useState(false);

  const toggleBarrier = b => setBarriers(p => p.includes(b) ? p.filter(x=>x!==b) : [...p, b]);

  /* Picking a learner from the class roster auto-fills surname & firstname */
  const rosterLearners = className ? (CLASS_DATA[className] || []) : [];
  const pickFromRoster = (val) => {
    if(!val) return;
    const [s,f] = val.split('|');
    setSurname(s); setFirstname(f);
  };

  const handleSave = async () => {
    if(!surname.trim() || !firstname.trim()){alert('Surname and first name are required.');return;}
    if(!className){alert('Please select a class.');return;}
    if(!teacherName.trim() || !teacherWhatsapp.trim()){alert('Teacher name and WhatsApp are required.');return;}
    if(barriers.length===0){
      if(!confirm('No barriers selected. Continue anyway?')) return;
    }
    setBusy(true);
    try{
      const payload = {
        surname: surname.trim(),
        firstname: firstname.trim(),
        class_name: className,
        barriers,
        comments: comments.trim() || null,
        teacher_name: teacherName.trim(),
        teacher_whatsapp: teacherWhatsapp.trim()
      };
      if(isNew){
        const created = await db.post('carissa_interventions', payload);
        onSaved(created[0], false);
      } else {
        const updated = await db.patch('carissa_interventions', `id=eq.${row.id}`, payload);
        onSaved(updated[0], true);
      }
    }catch(e){alert('Error: '+e.message);}
    setBusy(false);
  };

  return (
    <div style={ovly} onClick={onClose}>
      <div style={{...mdl,maxWidth:'700px'}} onClick={e=>e.stopPropagation()}>
        <h2 style={{color:'#667eea',marginBottom:'14px'}}>
          {isNew ? '➕ Add New Intervention' : '✏️ Edit Intervention'}
        </h2>

        {/* Class + roster picker */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'12px'}}>
          <div>
            <label style={lbl}>Class *</label>
            <select style={inp} value={className} onChange={e=>{setClassName(e.target.value);}}>
              <option value="">-- Select Class --</option>
              {CLASS_NAMES.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Pick from class roster (optional)</label>
            <select style={inp} value="" onChange={e=>pickFromRoster(e.target.value)} disabled={!className}>
              <option value="">-- Pick learner to auto-fill --</option>
              {rosterLearners.map((l,i)=>(
                <option key={i} value={`${l.surname}|${l.firstname}`}>{l.surname}, {l.firstname}</option>
              ))}
            </select>
          </div>
        </div>

        {/* Name fields (editable, even after pick-from-roster) */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'12px'}}>
          <div>
            <label style={lbl}>Surname *</label>
            <input style={inp} value={surname} onChange={e=>setSurname(e.target.value)}/>
          </div>
          <div>
            <label style={lbl}>First Name *</label>
            <input style={inp} value={firstname} onChange={e=>setFirstname(e.target.value)}/>
          </div>
        </div>

        {/* Barriers — tick/untick to add or remove */}
        <div style={{marginBottom:'12px'}}>
          <label style={{...lbl,marginBottom:'8px'}}>Barriers (tick to add, untick to remove)</label>
          <div style={{background:'#f8f9fa',padding:'10px',borderRadius:'8px',maxHeight:'200px',overflowY:'auto'}}>
            {BARRIERS.map(b=>(
              <div key={b} onClick={()=>toggleBarrier(b)} style={{display:'flex',alignItems:'center',gap:'10px',padding:'7px',cursor:'pointer',borderRadius:'5px'}}>
                <input type="checkbox" checked={barriers.includes(b)} readOnly style={{width:18,height:18,cursor:'pointer'}}/>
                <label style={{cursor:'pointer',fontSize:'13px',color:'#333',flex:1}}>{b}</label>
              </div>
            ))}
          </div>
        </div>

        {/* Comments */}
        <div style={{marginBottom:'12px'}}>
          <label style={lbl}>Comments / Notes</label>
          <textarea style={{...inp,resize:'vertical'}} rows={3} value={comments} onChange={e=>setComments(e.target.value)} placeholder="Specific challenges, observations, recommendations..."/>
        </div>

        {/* Teacher info */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'14px'}}>
          <div>
            <label style={lbl}>Teacher Name *</label>
            <input style={inp} value={teacherName} onChange={e=>setTeacherName(e.target.value)}/>
          </div>
          <div>
            <label style={lbl}>Teacher WhatsApp *</label>
            <input style={inp} value={teacherWhatsapp} onChange={e=>setTeacherWhatsapp(e.target.value)} placeholder="e.g. 082..."/>
          </div>
        </div>

        <div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
          <button style={btn} onClick={handleSave} disabled={busy}>
            {busy ? 'Saving...' : (isNew ? '💾 Add Intervention' : '💾 Save Changes')}
          </button>
          <button style={{...btn,background:'#6c757d'}} onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

const PRAC2_INTERMEDIATE = [

  {k:'skip_lines',      label:'Skip 2 lines',                               max:1},

  return phase==='foundation' ? PRAC2_FOUNDATION : PRAC2_INTERMEDIATE;
}

function AssessmentsTab({assessments,setAssessments,exportReport,exportClassSummary,onProjectTest}){
  const [selClass,setSelClass]=useState('');
  const [search,setSearch]=useState('');
  const [editing,setEditing]=useState(null); // {surname, firstname, existingId?}
  const [msg,setMsg]=useState('');
  const showMsg = m => {setMsg(m);setTimeout(()=>setMsg(''),5000);};

  const classLearners = selClass ? (CLASS_DATA[selClass]||[]) : [];
  const filtered = search.trim()
    ? classLearners.filter(l => (`${l.surname} ${l.firstname}`).toLowerCase().includes(search.toLowerCase()))
    : classLearners;

  // Pre-compute assessments for the selected class (Term 2 only)
  const classAssessments = selClass
    ? assessments.filter(a => a.class_name===selClass && a.term==='Term 2')
    : [];

  // Quick lookup: which learners in this class already have an assessment for Term 2 / this year
  const assessmentFor = (cls, surname, firstname) => assessments.find(a =>
    a.class_name===cls && a.surname===surname && a.firstname===firstname && a.term==='Term 2'
  );

  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}

      <div style={{...card,marginBottom:'14px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px',flexWrap:'wrap',marginBottom:'14px'}}>
          <h3 style={{...ctitle,marginBottom:0}}>📝 eLearning Assessments — Term 2</h3>
          <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
            {selClass && classAssessments.length>0 && (
              <button style={{...sbtn,background:'#10b981',fontSize:'13px'}} onClick={()=>exportClassSummary(selClass, phaseForClass(selClass), classAssessments)}>
                📄 Export Class Summary
              </button>
            )}
            <button style={{...sbtn,background:'#f97316',fontSize:'13px'}} onClick={()=>onProjectTest(selClass ? phaseForClass(selClass) : 'intermediate')}>
              📺 Project Test (Full-screen)
            </button>
          </div>
        </div>
        <p style={{color:'#666',fontSize:'13px',marginBottom:'14px'}}>
          Pick a class, then click <strong>+ Assess</strong> next to a learner to start. Learners who already have an assessment will show a ✓ with their mark — click to view or edit.
        </p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))',gap:'12px'}}>
          <div>
            <label style={lbl}>Class</label>
            <select style={inp} value={selClass} onChange={e=>{setSelClass(e.target.value);setSearch('');}}>
              <option value="">-- Select Class --</option>
              {ASSESS_CLASS_NAMES.map(n=>(
                <option key={n} value={n}>{n} ({CLASS_DATA[n].length})</option>
              ))}
            </select>
          </div>
          <div>
            <label style={lbl}>Search learner</label>
            <input style={inp} placeholder="Type a name to filter..." value={search} onChange={e=>setSearch(e.target.value)} disabled={!selClass}/>
          </div>
        </div>
      </div>

      {selClass && (
        <div style={card}>
          <h3 style={ctitle}>{selClass} — Learners ({filtered.length})</h3>
          {filtered.length===0 ? (
            <p style={{color:'#999',textAlign:'center',padding:'20px'}}>No learners match your search.</p>
          ) : (
            <div style={{display:'grid',gap:'8px'}}>
              {filtered.map((l,i)=>{
                const existing = assessmentFor(selClass, l.surname, l.firstname);
                return (
                  <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 14px',background:existing?'#e8f5e9':'#f8f9fa',borderRadius:'10px',borderLeft:`5px solid ${existing?'#28a745':'#cbd5e1'}`,gap:'10px',flexWrap:'wrap'}}>
                    <div style={{flex:1,minWidth:'180px'}}>
                      <div style={{fontWeight:600,color:'#333',fontSize:'14px'}}>
                        {l.surname}, {l.firstname}
                      </div>
                      {existing && (
                        <div style={{fontSize:'12px',color:'#155724',marginTop:'2px'}}>
                          ✓ Assessed {new Date(existing.date_assessed).toLocaleDateString('en-ZA')} — <strong>{existing.grand_total}/20</strong>
                        </div>
                      )}
                    </div>
                    <div style={{display:'flex',gap:'8px',flexShrink:0,flexWrap:'wrap'}}>
                      {existing ? (
                        <>
                          <button style={{...sbtn,background:'#667eea',fontSize:'13px'}} onClick={()=>setEditing({...l, existing})}>
                            ✏️ View / Edit
                          </button>
                          <button style={{...sbtn,background:'#10b981',fontSize:'13px'}} onClick={()=>exportReport(existing)}>
                            📥 Export Report
                          </button>
                        </>
                      ) : (
                        <button style={{...sbtn,background:'#f97316',fontSize:'13px'}} onClick={()=>setEditing({...l, existing:null})}>
                          + Assess
                        </button>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {editing && (
        <AssessmentModal
          learner={editing}
          className={selClass}
          phase={phaseForClass(selClass)}
          onClose={()=>setEditing(null)}
          onSaved={(record, isUpdate)=>{
            setAssessments(p => isUpdate ? p.map(a=>a.id===record.id?record:a) : [record,...p]);
            showMsg(isUpdate ? '✓ Assessment updated.' : '✓ Assessment saved.');
            setEditing(null);
          }}
          onDelete={(id)=>{
            setAssessments(p => p.filter(a=>a.id!==id));
            showMsg('✓ Assessment deleted.');
            setEditing(null);
          }}
        />
      )}
    </div>
  );
}

/* ── Assessment form modal ──────────────────────────────────── */
function AssessmentModal({learner,className,phase,onClose,onSaved,onDelete}){
  const existing = learner.existing;
  const isUpdate = !!existing;

  const [oral,setOral]=useState(existing?.oral_scores || {q1:false,q2:false,q3:false,q4:false,q5:false});
  const [prac1,setPrac1]=useState(existing?.prac1_scores || {open:false,close:false,minimise:false,maximise:false,hide_retrieve:false});
  const [prac2,setPrac2]=useState(()=>{
    if(existing?.prac2_scores) return existing.prac2_scores;
    const items = getPrac2Items(phase);
    const init = {};
    items.forEach(it => init[it.k] = 0);
    return init;
  });
  const [comments,setComments]=useState(existing?.comments || '');
  const [busy,setBusy]=useState(false);

  const prac2Items = getPrac2Items(phase);

  const oralTotal = Object.values(oral).filter(Boolean).length;
  const prac1Total = Object.values(prac1).filter(Boolean).length;
  const prac2Total = prac2Items.reduce((s,it) => s + (parseInt(prac2[it.k],10)||0), 0);
  const grand = oralTotal + prac1Total + prac2Total;

  const handleSave = async () => {
    setBusy(true);
    try{
      const payload = {
        surname: learner.surname,
        firstname: learner.firstname,
        class_name: className,
        term: 'Term 2',
        year: new Date().getFullYear(),
        phase,
        date_assessed: existing?.date_assessed || new Date().toISOString().split('T')[0],
        assessed_by: existing?.assessed_by || 'Admin',
        oral_scores: oral, oral_total: oralTotal,
        prac1_scores: prac1, prac1_total: prac1Total,
        prac2_scores: prac2, prac2_total: prac2Total,
        grand_total: grand,
        comments: comments.trim() || null,
        updated_at: new Date().toISOString()
      };
      if(isUpdate){
        const rows = await db.patch('carissa_elearning_assessments',`id=eq.${existing.id}`,payload);
        onSaved(rows[0], true);
      } else {
        const rows = await db.post('carissa_elearning_assessments',payload);
        onSaved(rows[0], false);
      }
    }catch(e){ alert('Error: '+e.message); }
    setBusy(false);
  };

  const handleDelete = async () => {
    if(!confirm('Delete this assessment? This cannot be undone.')) return;
    setBusy(true);
    try{
      await db.del('carissa_elearning_assessments',`id=eq.${existing.id}`);
      onDelete(existing.id);
    }catch(e){ alert('Error: '+e.message); }
    setBusy(false);
  };

  return (
    <div style={ovly} onClick={onClose}>
      <div style={{...mdl,maxWidth:'720px'}} onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'8px',flexWrap:'wrap',gap:'8px'}}>
          <div>
            <h2 style={{color:'#667eea',marginBottom:'4px'}}>📝 eLearning Assessment</h2>
            <p style={{color:'#333',fontSize:'14px'}}>
              <strong>{learner.surname}, {learner.firstname}</strong> — {className} ({phase === 'foundation' ? 'Foundation Phase' : 'Intermediate Phase'})
            </p>
          </div>
          <div style={{background:'#667eea22',color:'#667eea',padding:'10px 16px',borderRadius:'12px',fontWeight:700,fontSize:'18px'}}>
            {grand}/20
          </div>
        </div>

        {/* ── SECTION A: ORAL ─────────────────────── */}
        <div style={{background:'#f8f9fa',padding:'14px',borderRadius:'10px',marginBottom:'12px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>
            <h4 style={{color:'#667eea',fontSize:'15px'}}>A. Oral Assessment</h4>
            <span style={{fontWeight:700,color:'#667eea'}}>{oralTotal}/5</span>
          </div>
          {ORAL_QUESTIONS.map(q=>(
            <div key={q.k} onClick={()=>setOral(p=>({...p,[q.k]:!p[q.k]}))} style={{display:'flex',alignItems:'flex-start',gap:'10px',padding:'8px',background:'white',borderRadius:'6px',marginBottom:'6px',cursor:'pointer'}}>
              <input type="checkbox" checked={!!oral[q.k]} readOnly style={{width:18,height:18,cursor:'pointer',marginTop:2}}/>
              <div style={{flex:1,fontSize:'13px',color:'#333'}}>
                <div>{q.q}</div>
                {q.a && <div style={{fontSize:'11px',color:'#888',marginTop:'2px'}}>Expected: {q.a}</div>}
              </div>
            </div>
          ))}
        </div>

        {/* ── SECTION B: PRACTICAL 1 ─────────────── */}

        <div style={{background:'#f8f9fa',padding:'14px',borderRadius:'10px',marginBottom:'12px'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}}>

                </label>
              ) : (
                <select value={prac2[it.k]||0} onChange={e=>setPrac2(p=>({...p,[it.k]:parseInt(e.target.value,10)}))} style={{padding:'4px 8px',border:'1px solid #ddd',borderRadius:'6px',fontSize:'13px',cursor:'pointer',background:'white'}}>
                  {Array.from({length:it.max+1},(_,i)=><option key={i} value={i}>{i}/{it.max}</option>)}
                </select>
              )}
            </div>
          ))}
        </div>

        <div style={{marginBottom:'14px'}}>
          <label style={lbl}>Teacher's comment (optional)</label>
          <textarea style={{...inp,resize:'vertical'}} rows={3}
            value={comments} onChange={e=>setComments(e.target.value)}
            placeholder="Strengths, areas to work on, anything to remember..."/>
        </div>

        <div style={{display:'flex',gap:'10px',flexWrap:'wrap'}}>
          <button style={btn} onClick={handleSave} disabled={busy}>
            {busy ? 'Saving...' : (isUpdate ? '💾 Update Assessment' : '💾 Save Assessment')}

          {isUpdate && (
            <button style={{...btn,background:'#dc3545'}} onClick={handleDelete} disabled={busy}>

            </button>
          )}
          <button style={{...btn,background:'#6c757d'}} onClick={onClose}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   ADMIN DASHBOARD: AUDIT & RECOVERY TAB (NEW)
   View change history and restore deleted records
   ════════════════════════════════════════════════════════════════ */
const AUDIT_TABLES = [
  {v:'all', l:'All tables'},
  {v:'carissa_interventions', l:'Interventions', friendly:'Interventions'},
  {v:'carissa_elearning_assessments', l:'eLearning Assessments', friendly:'Assessments'},
  {v:'carissa_resources', l:'Resources', friendly:'Resources'},
  {v:'carissa_resource_assignments', l:'Resource Assignments', friendly:'Assignments'},
  {v:'carissa_teachers', l:'Teachers', friendly:'Teachers'},
];
const friendlyTable = t => AUDIT_TABLES.find(x=>x.v===t)?.friendly || t;

function AuditAdminTab(){
  const [logs,setLogs]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filterTable,setFT]=useState('all');
  const [filterOp,setFO]=useState('all');
  const [search,setSearch]=useState('');
  const [msg,setMsg]=useState('');
  const showMsg = m => {setMsg(m);setTimeout(()=>setMsg(''),5000);};

  const load = async () => {
    setLoading(true);
    try{
      // Last 500 entries should be plenty
      const d = await db.get('carissa_audit_log','order=changed_at.desc&limit=500');
      setLogs(d);
    }catch(e){console.error(e);}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  /* Restore: re-insert a deleted record from its old_data snapshot */
  const restore = async (entry) => {
    if(entry.operation !== 'DELETE'){alert('Only deleted records can be restored.');return;}
    const data = entry.old_data;
    if(!data){alert('No data to restore.');return;}
    if(!confirm(`Restore this ${friendlyTable(entry.table_name)} record?`)) return;

    /* Strip timestamp fields that should regenerate; keep id so restored row points back to the same one */
    const payload = {...data};
    delete payload.created_at;
    delete payload.updated_at;

    try{
      await db.post(entry.table_name, payload, 'return=minimal');
      showMsg(`✓ Restored to ${friendlyTable(entry.table_name)}.`);
      await load(); // refresh to show the new INSERT audit entry
    }catch(e){
      /* If the id already exists (row was restored before, or never deleted physically), try without id */
      if(String(e.message).includes('duplicate')){
        const noId = {...payload}; delete noId.id;
        try{
          await db.post(entry.table_name, noId, 'return=minimal');
          showMsg(`✓ Restored (new id).`);
          await load();
        }catch(e2){alert('Restore failed: '+e2.message);}
      } else {
        alert('Restore failed: '+e.message);
      }
    }
  };

  /* Filtering */
  const filtered = logs.filter(l=>{
    const mt = filterTable==='all' || l.table_name===filterTable;
    const mo = filterOp==='all' || l.operation===filterOp;
    if(!search.trim()) return mt && mo;
    const blob = JSON.stringify(l.old_data || l.new_data || {}).toLowerCase();
    return mt && mo && blob.includes(search.toLowerCase());
  });

  /* Friendly description of an entry */
  const describe = (l) => {
    const d = l.old_data || l.new_data || {};
    if(d.surname && d.firstname) return `${d.surname}, ${d.firstname}${d.class_name?` (${d.class_name})`:''}`;
    if(d.title) return d.title;
    if(d.teacher_name) return `${d.teacher_name} (${d.class_name||''})`;
    return l.row_id || '—';
  };

  const opColor = op => op==='INSERT' ? '#28a745' : op==='UPDATE' ? '#f97316' : '#dc3545';
  const opIcon  = op => op==='INSERT' ? '➕' : op==='UPDATE' ? '✏️' : '🗑';

  /* Count of restorable (deleted) records */
  const deletedCount = logs.filter(l=>l.operation==='DELETE').length;
  const insertCount  = logs.filter(l=>l.operation==='INSERT').length;
  const updateCount  = logs.filter(l=>l.operation==='UPDATE').length;

  if(loading) return <div style={{textAlign:'center',padding:'80px',color:'#667eea'}}>Loading change history...</div>;

  return (
    <div>
      {msg && <div style={succ}>{msg}</div>}

      <div style={card}>
        <h3 style={ctitle}>🛡 Audit & Recovery</h3>
        <p style={{color:'#666',fontSize:'13px',marginBottom:'14px'}}>
          Every change to every table is recorded here. If something is deleted by mistake, you can restore it with one click.
          This protection started from {new Date().toLocaleDateString('en-ZA',{day:'numeric',month:'long',year:'numeric'})}.
        </p>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:'10px',marginBottom:'14px'}}>
          <div style={{background:'#e8f5e9',padding:'12px',borderRadius:'8px',textAlign:'center'}}>
            <div style={{fontSize:'22px',fontWeight:700,color:'#28a745'}}>{insertCount}</div>
            <div style={{fontSize:'12px',color:'#666'}}>Records added</div>
          </div>
          <div style={{background:'#fff3e0',padding:'12px',borderRadius:'8px',textAlign:'center'}}>
            <div style={{fontSize:'22px',fontWeight:700,color:'#f97316'}}>{updateCount}</div>
            <div style={{fontSize:'12px',color:'#666'}}>Records updated</div>
          </div>
          <div style={{background:'#ffebee',padding:'12px',borderRadius:'8px',textAlign:'center'}}>
            <div style={{fontSize:'22px',fontWeight:700,color:'#dc3545'}}>{deletedCount}</div>
            <div style={{fontSize:'12px',color:'#666'}}>Deletions (restorable)</div>
          </div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'10px'}}>
          <div>
            <label style={lbl}>Table</label>
            <select style={inp} value={filterTable} onChange={e=>setFT(e.target.value)}>
              {AUDIT_TABLES.map(t=><option key={t.v} value={t.v}>{t.l}</option>)}
            </select>
          </div>
          <div>
            <label style={lbl}>Action</label>
            <select style={inp} value={filterOp} onChange={e=>setFO(e.target.value)}>
              <option value="all">All actions</option>
              <option value="INSERT">➕ Inserts</option>
              <option value="UPDATE">✏️ Updates</option>
              <option value="DELETE">🗑 Deletions</option>
            </select>
          </div>
          <div>
            <label style={lbl}>Search</label>
            <input style={inp} placeholder="Name, title..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
          <div style={{display:'flex',alignItems:'flex-end'}}>
            <button style={{...sbtn,background:'#667eea',width:'100%'}} onClick={load}>🔄 Refresh</button>
          </div>
        </div>
      </div>

      {filtered.length===0 ? (
        <div style={card}>
          <p style={{color:'#999',textAlign:'center',padding:'30px'}}>
            {logs.length===0 ? 'No changes recorded yet. Once you start using the app, every change will appear here.' : 'No entries match your filters.'}
          </p>
        </div>
      ) : (
        <div style={card}>
          <div style={{display:'grid',gap:'8px'}}>
            {filtered.map(l=>(
              <div key={l.id} style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',padding:'12px 14px',background:'#f8f9fa',borderRadius:'8px',borderLeft:`4px solid ${opColor(l.operation)}`,gap:'10px',flexWrap:'wrap'}}>
                <div style={{flex:1,minWidth:'200px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px',flexWrap:'wrap'}}>
                    <span style={{fontSize:'18px'}}>{opIcon(l.operation)}</span>
                    <span style={{background:opColor(l.operation)+'22',color:opColor(l.operation),padding:'2px 8px',borderRadius:'10px',fontSize:'11px',fontWeight:700}}>{l.operation}</span>
                    <span style={{background:'#667eea22',color:'#667eea',padding:'2px 8px',borderRadius:'10px',fontSize:'11px'}}>{friendlyTable(l.table_name)}</span>
                    <span style={{fontSize:'11px',color:'#888'}}>{new Date(l.changed_at).toLocaleString('en-ZA')}</span>
                  </div>
                  <div style={{fontWeight:600,color:'#333',fontSize:'14px'}}>{describe(l)}</div>
                  {l.operation==='DELETE' && l.old_data?.barriers && (
                    <div style={{marginTop:'4px'}}>
                      {(l.old_data.barriers||[]).map((b,i)=>(
                        <span key={i} style={{background:'#fff',border:'1px solid #ddd',padding:'1px 6px',borderRadius:'8px',fontSize:'10px',marginRight:'3px',color:'#666'}}>{b}</span>
                      ))}
                    </div>
                  )}
                </div>
                {l.operation==='DELETE' && (
                  <button style={{...sbtn,background:'#28a745',fontSize:'12px',padding:'6px 12px',flexShrink:0}} onClick={()=>restore(l)}>
                    ↩️ Restore
                  </button>
                )}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function CoordinatorView({onEditName,onDelete}){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');

  useEffect(()=>{
    (async()=>{
      try{
        const d = await db.get('carissa_interventions','order=class_name.asc,surname.asc');
        setData(d);
      }catch(e){console.error(e);}
      setLoading(false);
    })();
  },[]);

  const filtered = data.filter(r=>{
    const mb = filter==='all' || (r.barriers||[]).includes(filter);
    const ms = !search.trim() || (`${r.surname} ${r.firstname} ${r.class_name}`).toLowerCase().includes(search.toLowerCase());
    return mb && ms;
  });

  const exportExcel = () => {
    if(filtered.length===0){alert('Nothing to export');return;}
    const rows = filtered.map(r=>({
      'Class': r.class_name,
      'Surname': r.surname,
      'First Name': r.firstname,
      'Barriers': (r.barriers||[]).join(', '),
      'Teacher': r.teacher_name,
      'WhatsApp': r.teacher_whatsapp,
      'Comments': r.comments||'',
      'Date Added': r.date_added ? new Date(r.date_added).toLocaleDateString('en-ZA') : ''
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Interventions');
    XLSX.writeFile(wb, `Carissa_Interventions_${new Date().toISOString().split('T')[0]}.xlsx`);
  };

  const handleDel = async (r) => {
    if(!confirm(`Remove ${r.firstname} ${r.surname} from the intervention list?`)) return;
    try{
      await db.del('carissa_interventions',`id=eq.${r.id}`);
      setData(p=>p.filter(x=>x.id!==r.id));
    }catch(e){alert('Error: '+e.message);}

  if(loading) return <div style={{textAlign:'center',padding:'80px',color:'#667eea'}}>Loading...</div>;

  return (
    <div>
      <div style={card}>

            <input style={inp} placeholder="Search name or class..." value={search} onChange={e=>setSearch(e.target.value)}/>
          </div>
        </div>
      </div>

      {filtered.length===0 ? (
        <div style={card}><p style={{color:'#999',textAlign:'center',padding:'30px'}}>No matching entries.</p></div>
      ) : (
        <div style={card}>
          <div style={{overflowX:'auto'}}>
            <table style={{width:'100%',borderCollapse:'collapse',fontSize:'13px'}}>
              <thead>
                <tr style={{borderBottom:'2px solid #eee',background:'#f8f9fa'}}>
                  {['Class','Learner','Barriers','Teacher','Comments','Actions'].map(h=>(

                      {(r.barriers||[]).map((b,i)=>(
                        <span key={i} style={{background:'#667eea22',color:'#667eea',padding:'2px 6px',borderRadius:'8px',fontSize:'11px',marginRight:'3px',display:'inline-block',marginBottom:'2px'}}>{b}</span>

                    <td style={{padding:'10px',whiteSpace:'nowrap'}}>
